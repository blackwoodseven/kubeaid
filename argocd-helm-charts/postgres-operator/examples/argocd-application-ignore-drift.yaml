apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-operator
  namespace: argocd
  labels:
    kubeaid.io/managed-by: kubeaid
spec:
  destination:
    namespace: system
    server: https://kubernetes.default.svc
  project: kubeaid
  sources:
    - repoURL: https://gitea.obmondo.com/EnableIT/KubeAid
      path: argocd-helm-charts/postgres-operator
      targetRevision: HEAD
      helm:
        valueFiles:
          - $values/k8s/<cluster>/argocd-apps/values-postgres-operator.yaml
    - repoURL: <your-config-repo>
      targetRevision: HEAD
      ref: values
  # ignoreDifferences suppresses expected drift:
  # - CRD caBundle: Kubernetes auto-injects CA bundle into conversion webhook
  # - CRD status: updated by Kubernetes, not managed by Helm
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
        - /status
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
