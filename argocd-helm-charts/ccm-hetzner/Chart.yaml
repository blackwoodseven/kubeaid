apiVersion: v2
name: ccm-hetzner
description: Wrapper chart for upstream Hetzner Cloud Controller Manager (hetznercloud/hcloud-cloud-controller-manager). Replaces the legacy syself/hetzner-cloud-controller-manager fork — upstream gained Robot support and forwards kubelet --node-ip to InternalIP as of v1.24.0, which the syself fork never did.
type: application
version: 1.0.0
dependencies:
  - name: hcloud-cloud-controller-manager
    alias: ccm-hetzner
    version: 1.33.0
    repository: https://charts.hetzner.cloud
