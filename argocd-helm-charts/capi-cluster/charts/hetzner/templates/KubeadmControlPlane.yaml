apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: {{ .Values.global.clusterName }}-control-plane
spec:
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        # Mirrors upstream CAPH's hcloud-kcp-ubuntu.yaml — only the
        # kubelet-preferred-address-types flag. The faster-failover
        # tolerations, profiling, TLS cipher-suites hardening etc. were
        # carried as kubeaid-side opinion for a long time; they're now
        # being pushed to upstream via separate Obmondo CAPH PRs
        # (feat/apiserver-tls-cipher-suites-allowlist, etc.). When
        # those land, we converge cleanly. Until then, post-bootstrap
        # security tooling (kube-bench, kubescape, OPA) is the right
        # layer for enforcement, not chart-side flag pinning.
        extraArgs:
          # InternalIP is prepended to upstream CAPH's order
          # (ExternalIP,Hostname,InternalDNS,ExternalDNS) which assumes
          # HCloud servers always have a public IP. CP-only VPN clusters
          # don't, so the API server's kubelet proxy would otherwise fall
          # through to Hostname → host-resolver lookup → "no such host"
          # (the resolver from connect-nat-gateway.sh doesn't know
          # internal node names), breaking exec / port-forward /
          # log-streaming. InternalIP is always populated by HCloud CCM
          # and is harmless for clusters that do have a public IP.
          - name: kubelet-preferred-address-types
            value: InternalIP,ExternalIP,Hostname,InternalDNS,ExternalDNS
        {{- /* Operator-supplied apiserver flags rendered by kubeaid-cli into
             controlPlane.apiServer.extraArgs from the typed
             cluster.apiServer.oidc block (--authentication-config) and the
             audit-logging block (--audit-log-*). kubeaid-cli emits these as a
             map; CAPI v1beta2 wants a {name,value} list, so convert here.
             Empty / absent → nothing emitted. */}}
        {{- range $name, $value := ((.Values.controlPlane).apiServer).extraArgs }}
          - name: {{ $name }}
            value: {{ $value | quote }}
        {{- end }}
        {{/* certSANs lets clients reach kube-apiserver under names other
             than controlPlaneEndpoint.host without tripping x509 errors.
             Includes the LB endpoint hostname (when set) plus any operator-
             supplied extras (e.g. the NetBird-mesh form "kubernetes.<zone>").
             Rendered whenever either is present — so the default
             kubernetes.<netbird-dns-zone> SAN lands even on clusters where
             CAPH (not kubeaid-cli) supplies the endpoint, and endpoint.host
             is therefore unset here. */}}
        {{- if or (.Values.controlPlane.endpoint).host .Values.controlPlane.extraCertSANs }}
        certSANs:
          {{- with (.Values.controlPlane.endpoint).host }}
          - {{ . }}
          {{- end }}
          {{- range .Values.controlPlane.extraCertSANs }}
          - {{ . }}
          {{- end }}
        {{- end }}
        {{- /* Operator-supplied host-path mounts into the apiserver static
             pod — e.g. the OIDC AuthenticationConfiguration file and audit
             policy/log mounts. kubeaid-cli's HostPathMountConfig already
             matches kubeadm's HostPathMount shape (name/hostPath/mountPath/
             readOnly/pathType), so pass it through. */}}
        {{- with ((.Values.controlPlane).apiServer).extraVolumes }}
        extraVolumes: {{- . | toYaml | nindent 10 }}
        {{- end }}
      controllerManager:
        # Mirrors upstream CAPH — only `cloud-provider: external` (needed
        # for external HCloud CCM). profiling and terminated-pod-gc-threshold
        # customizations dropped along with the apiServer trim.
        extraArgs:
          - name: cloud-provider
            value: external
      etcd:
        local:
          dataDir: /var/lib/etcd
    files:
    {{/* Full kubelet config — security overlay PLUS the kubeadm-required
         fields that kubelet otherwise gets from kubeadm's auto-generated
         /var/lib/kubelet/config.yaml. When kubeletExtraArgs sets --config
         to our file below, kubelet reads ONLY our file and kubeadm's
         auto-config is ignored end-to-end, so any field we forget defaults
         to kubelet's CLI-flag default (NOT kubeadm's). The previous shape
         silently dropped cgroupDriver → kubelet defaulted to "cgroupfs"
         while containerd uses "systemd" → no containers started → kubelet
         hung in a 1-min bootstrap loop.

         The cluster-wide values (clusterDNS at the service-CIDR's .10,
         clusterDomain=cluster.local, the containerd unix socket path) are
         kubeadm-defaults that don't vary per-cluster in this chart; safe
         to hardcode. Same security profile as upstream CAPH's md-0
         KubeadmConfigTemplate, with maxPods=120 because control-plane
         nodes only run system pods. */}}
    - path: /etc/kubernetes/kubelet/config.yaml
      owner: "root:root"
      permissions: "0644"
      content: |
        apiVersion: kubelet.config.k8s.io/v1beta1
        kind: KubeletConfiguration
        authentication:
          anonymous:
            enabled: false
          webhook:
            enabled: true
          x509:
            clientCAFile: /etc/kubernetes/pki/ca.crt
        authorization:
          mode: Webhook
        cgroupDriver: systemd
        clusterDNS:
          - 10.96.0.10
        clusterDomain: cluster.local
        containerRuntimeEndpoint: unix:///var/run/containerd/containerd.sock
        eventRecordQPS: 5
        maxPods: 120
        readOnlyPort: 0
        resolvConf: /etc/kubernetes/resolv.conf
        rotateCertificates: true
        serverTLSBootstrap: true
        staticPodPath: /etc/kubernetes/manifests
        {{- if and (eq .Values.mode "bare-metal") .Values.bareMetal.vSwitch }}
        {{/* CPs share this KubeadmConfigSpec across every Machine the KCP
             creates, so the per-host privateIP can't be baked in at chart-
             render time. The placeholder below is sed-replaced at boot by
             the preKubeadm vSwitch block with the IP from the DMI chassis-
             serial lookup. */}}
        nodeIP: __KUBEAID_NODE_IP__
        {{- end }}
        tlsCipherSuites:
          - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
          - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
          - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
          - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
          - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
          - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
          - TLS_RSA_WITH_AES_256_GCM_SHA384
          - TLS_RSA_WITH_AES_128_GCM_SHA256

    {{- if and (ne .Values.mode "bare-metal") (or (eq .Values.mode "hybrid") (eq .Values.network.type "private")) }}
    {{/* NAT gateway script is only needed when HCloud nodes run on a
         private network (and the HCloud side of hybrid). Pure bare-metal
         is excluded: those hosts have their own public connectivity and
         no NAT gateway — network.type defaults to "private", so without
         the mode guard they'd ship and run this script for nothing.
         Gateway IP + DNS resolver come from values so non-default private
         networks work; the interface name is discovered at runtime so the
         script isn't pinned to HCloud's enp7s0. */}}
    - content: |
        set -eu
        NAT_GATEWAY_IP="{{ .Values.hcloud.natGatewayIP }}"
        DNS_SERVER="{{ .Values.hcloud.dnsServer }}"

        ROUTE_ADDED=0
        for i in $(seq 1 30); do
          if ip route add default via "$NAT_GATEWAY_IP" 2>/dev/null; then
            ROUTE_ADDED=1
            break
          fi
          sleep 10
        done
        if [ "$ROUTE_ADDED" -ne 1 ]; then
          echo "FATAL: could not add default route via $NAT_GATEWAY_IP after 30 retries" >&2
          exit 1
        fi

        IFACE=$(ip -o -4 route show default | awk '{print $5; exit}')
        echo "nameserver $DNS_SERVER" | tee -a /etc/resolv.conf
        resolvectl dns "$IFACE" "$DNS_SERVER"
      owner: "root:root"
      path: /connect-nat-gateway.sh
      permissions: "0744"
    {{- end }}

    {{- if eq .Values.mode "bare-metal" }}
    - content: |
        [Unit]
        Description=Cilium BPF mounts
        Documentation=https://docs.cilium.io/
        DefaultDependencies=no
        Before=local-fs.target umount.target
        After=swap.target

        [Mount]
        What=bpffs
        Where=/sys/fs/bpf
        Type=bpf
        Options=rw,nosuid,nodev,noexec,relatime,mode=700

        [Install]
        WantedBy=multi-user.target
      owner: "root:root"
      path: /etc/systemd/system/sys-fs-bpf.mount
      permissions: "0744"
    {{- end }}
    - content: |
        net.ipv4.conf.lxc*.rp_filter = 0
      owner: root:root
      path: /etc/sysctl.d/99-cilium.conf
      permissions: "0744"
    - content: |
        overlay
        br_netfilter
      owner: root:root
      path: /etc/modules-load.d/crio.conf
      permissions: "0744"
    - content: |
        net.bridge.bridge-nf-call-iptables  = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward                 = 1
      owner: root:root
      path: /etc/sysctl.d/99-kubernetes-cri.conf
      permissions: "0744"
    - content: |
        vm.overcommit_memory=1
        kernel.panic=10
        kernel.panic_on_oops=1
        # Kernel defaults (128 instances) are too low for dense k8s nodes;
        # exhausting fs.inotify.max_user_instances wedges kubelet's CSI
        # plugin-watcher. 8192 / 524288 is the k8s-ecosystem standard.
        fs.inotify.max_user_instances=8192
        fs.inotify.max_user_watches=524288
      owner: root:root
      path: /etc/sysctl.d/99-kubelet.conf
      permissions: "0744"
    - content: |
        nameserver 1.1.1.1
        nameserver 1.0.0.1
        nameserver 2606:4700:4700::1111
      owner: root:root
      path: /etc/kubernetes/resolv.conf
      permissions: "0744"
    - content: |
        # Copyright The containerd Authors.
        #
        # Licensed under the Apache License, Version 2.0 (the "License");
        # you may not use this file except in compliance with the License.
        # You may obtain a copy of the License at
        #
        #     http://www.apache.org/licenses/LICENSE-2.0
        #
        # Unless required by applicable law or agreed to in writing, software
        # distributed under the License is distributed on an "AS IS" BASIS,
        # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        # See the License for the specific language governing permissions and
        # limitations under the License.
        #
        # https://raw.githubusercontent.com/containerd/containerd/main/containerd.service

        [Unit]
        Description=containerd container runtime
        Documentation=https://containerd.io
        After=network.target local-fs.target dbus.service

        [Service]
        ExecStartPre=-/sbin/modprobe overlay
        ExecStart=/usr/local/bin/containerd

        Type=notify
        Delegate=yes
        KillMode=process
        Restart=always
        RestartSec=5

        # Having non-zero Limit*s causes performance problems due to accounting overhead
        # in the kernel. We recommend using cgroups to do container-local accounting.
        LimitNPROC=infinity
        LimitCORE=infinity

        # Comment TasksMax if your systemd version does not supports it.
        # Only systemd 226 and above support this version.
        TasksMax=infinity
        OOMScoreAdjust=-999

        [Install]
        WantedBy=multi-user.target
      owner: root:root
      path: /etc/systemd/system/containerd.service
      permissions: "0744"
    {{/*
      TODO : We need to apply the netplan config, only when using a Floating IP.
             Otherwise, when using a single master node for the control-plane, we just provide
             that master node's IP.
    */}}
    {{- if eq .Values.mode "bare-metal" }}
    {{/*
      Netplan is the default network configuration utility on Ubuntu. It configures network
      interfaces using YAML files, which are then translated into systemd-networkd or
      NetworkManager configurations.

      Using Netplan, we'll bind the Floating IP with the master node's primary network interface.
    */}}
    - content: |
        #!/bin/bash
        wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        chmod a+x /usr/local/bin/yq

        interface_name=$(/usr/local/bin/yq '.network.ethernets | keys | .[0]' /etc/netplan/01-netcfg.yaml)

        touch /etc/netplan/60-floating-ip.yaml && chmod 600 /etc/netplan/60-floating-ip.yaml
        cat <<EOT > /etc/netplan/60-floating-ip.yaml
        network:
          version: 2
          renderer: networkd
          ethernets:
            $interface_name:
              addresses:
                - {{ .Values.controlPlane.bareMetal.endpoint.host }}/32
        EOT

        netplan apply
      owner: root:root
      path: /bind-floating-ip.sh
      permissions: "0744"
    {{- end }}
    {{- if ((.Values.controlPlane).apiServer).files }}
    {{- ((.Values.controlPlane).apiServer).files | toYaml | nindent 4 }}
    {{- end }}
    initConfiguration:
      skipPhases:
        - addon/kube-proxy
      nodeRegistration:
        kubeletExtraArgs:
          - name: cloud-provider
            value: external
          - name: config
            value: /etc/kubernetes/kubelet/config.yaml
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          - name: cloud-provider
            value: external
          - name: config
            value: /etc/kubernetes/kubelet/config.yaml
    {{- if (gt (len $.Values.global.additionalUsers) 0) }}
    users:
      {{- range $index, $additionalUser := $.Values.global.additionalUsers }}
      - name: {{ $additionalUser.name }}
        sshAuthorizedKeys:
          - {{ $additionalUser.sshPublicKey }}
      {{- end }}
    {{- end }}
    preKubeadmCommands:
      - set -x

      {{/* The NAT-gateway hop only exists for HCloud machines on a
           private network (and the HCloud side of hybrid). network.type
           defaults to "private", so without the mode guard a pure
           bare-metal node — which has its own public connectivity and
           no 10.0.0.1 gateway — spent 5 minutes retrying an impossible
           default route on every boot. */}}
      {{- if and (ne .Values.mode "bare-metal") (or (eq .Values.mode "hybrid") (eq .Values.network.type "private")) }}
      - chmod +x /connect-nat-gateway.sh && /connect-nat-gateway.sh
      {{- end }}

      {{/* Give highest priority to the Network Card / Connection entry in the boot order.
           Otherwise, we cannot boot the servers into rescue mode, and need to reach out to the
           Hetzner support team. Guarded: legacy-BIOS hosts have no EFI
           variables (efibootmgr errors out), and an EFI host without a
           network boot entry would otherwise call `efibootmgr -o` with
           an empty argument. */}}
      {{- if eq .Values.mode "bare-metal" }}
      - |
        if [ ! -d /sys/firmware/efi ]; then
          echo "legacy BIOS boot — skipping EFI boot-order adjustment"
        else
          NETBOOT=$(efibootmgr -v \
            | grep -E "Network (Card|Connection)" \
            | sed 's/Boot\([0-9A-F]*\).*/\1/' \
            | head -n1)
          if [ -z "$NETBOOT" ]; then
            echo "no EFI network boot entry found — skipping boot-order adjustment"
          else
            CURRENT_ORDER=$(efibootmgr | grep "BootOrder:" | cut -d' ' -f2)
            NEW_ORDER=$(echo "$CURRENT_ORDER" | sed "s/$NETBOOT,\?//g" | sed "s/^/$NETBOOT,/" | sed 's/,$//')
            efibootmgr -o "$NEW_ORDER"
          fi
        fi
      {{- end }}

      {{/*
        User provided commands used to setup the disk layout.
        We recommend the following :

          (1) If NVMe, then create a ZPool out of the available storage space.
              That ZPool will be used by Kubernetes ephemeral volumes, pod logs and OpenEBS ZFS
              LocalPV provisioner.

          (2) If HDD / regular SSD, then create a partition out of the available storage space,
              allocating it to Rook Ceph.
      */}}
      {{- if eq .Values.mode "bare-metal" }}
      - |
        # Fail loudly if the storagectl download (or the planner itself) fails.
        # See KubeadmConfig.yaml's matching block for the full rationale.
        #
        # cloud-init's runcmd shellify concatenates every entry into one
        # /var/lib/cloud/instance/scripts/runcmd file under a single shebang
        # and runs it as one script, so a bare `set -euo pipefail` here leaks
        # nounset into the entries that follow — including the post-kubeadm
        # `mkdir -p $HOME/.kube` chain near the bottom of this file, where
        # cloud-init's runcmd shell doesn't export HOME, and `set -u` then
        # exits non-zero on `$HOME`. The whole block lives in a subshell so
        # the set options stay scoped to OUR strict-mode requirement and
        # don't punish unrelated entries.
        (
          set -euo pipefail
          STORAGECTL_ARCH="$(uname -m)"
          case "$STORAGECTL_ARCH" in aarch64) STORAGECTL_ARCH=arm64 ;; esac
          STORAGECTL_URL="https://github.com/Obmondo/kubeaid-cli/releases/{{ if $.Values.global.kubeaidStoragectl.version }}download/{{ $.Values.global.kubeaidStoragectl.version }}{{ else }}latest/download{{ end }}/kubeaid-storagectl_Linux_${STORAGECTL_ARCH}"
          wget -O kubeaid-storagectl "$STORAGECTL_URL" || { echo "ERROR: kubeaid-storagectl download failed from $STORAGECTL_URL" >&2; exit 1; }
          [ -s kubeaid-storagectl ] || { echo "ERROR: kubeaid-storagectl downloaded empty (likely 404) from $STORAGECTL_URL" >&2; exit 1; }
          chmod +x ./kubeaid-storagectl
          ./kubeaid-storagectl plan execute --os-size {{ $.Values.bareMetal.installImage.vg0.size }} --zfs-pool-size {{ $.Values.controlPlane.bareMetal.zfs.size }}
        )
      {{- end }}

      - export CONTAINERD=2.2.3
      - export RUNC=1.2.5
      - export KUBERNETES_VERSION=$(echo {{ $.Values.global.kubernetes.version }} | sed 's/^v//')
      - export TRIMMED_KUBERNETES_VERSION=$(echo ${KUBERNETES_VERSION} | sed 's/^v//' | awk -F . '{print $1 "." $2}')
      - ARCH="$(dpkg --print-architecture)"
      - localectl set-locale LANG=en_US.UTF-8
      - localectl set-locale LANGUAGE=en_US.UTF-8
      - apt-get update -y
      - apt-get -y install at jq unzip wget logrotate apt-transport-https

      {{- if eq .Values.mode "bare-metal" }}

      {{/*
        On the first master node (where 'kubeadm init' is executed),
        we need to have this netplan config in effect, before 'kubeadm init' execution. Otherwise,
        preflight checks will fail and 'kubeadm init' won't succeed.

        On the second and other remaining master nodes, after 'kubeadm join' is executed,
        we will create and apply this same netplan config.
        If we have this netplan config before executing 'kubeadm join', then the Floating IP
        will be attached to its own primary network interface as well. Which will cause it to
        loopback to itself, instead of reaching out to the first master node.
      */}}
      - |
        [ ! -f /run/kubeadm/kubeadm-join-config.yaml ] && \
          chmod +x /bind-floating-ip.sh && \
          /bind-floating-ip.sh

      {{/* BUG : The kubeadm-join-config.yaml gets removed before 'kubeadm join' execution. */}}
      - |
        [ -f /run/kubeadm/kubeadm-join-config.yaml ] && \
          cp /run/kubeadm/kubeadm-join-config.yaml /kubeadm-join-config.yaml
      {{- end }}

      {{- if and (eq .Values.mode "bare-metal") .Values.bareMetal.vSwitch }}
      {{/* Bring up the vSwitch VLAN sub-interface for inter-CP / CP-to-
           worker private traffic. Without it the node advertises no
           InternalIP, kubelet's serving-cert SAN list doesn't cover the
           dial path the apiserver falls through to (ExternalIP), and
           every apiserver→kubelet streaming call (port-forward, exec,
           logs) fails with "SPDY upgrade failed: 401 Unauthorized" from
           the apiserver's streamtunnel. Pure bare-metal previously
           lacked this block entirely — only hybrid mode set it up on
           the matching worker template, leaving CPs unconfigured.

           CPs share a single KubeadmConfigSpec across all Machines,
           so per-host privateIP can't be templated at chart-render
           time. The script below looks the host up at boot via DMI
           chassis-serial-number (Hetzner populates this with the
           server ID) and falls back to public-IP-based detection. */}}
      {{/* POSIX sh ONLY in runcmd scripts: cloud-init shellifies every
           entry into one script under #!/bin/sh (dash on Ubuntu).
           Bashisms fail at runtime, not render time — `declare -A`
           here once killed the whole runcmd with "declare: not found",
           leaving the node without containerd/kubelet/kubeadm-join.
           The serverID -> privateIP map is rendered as a case
           statement instead. */}}
      - |
        set -eu
        # Resolve this host's vSwitch privateIP. CP Machines share one
        # KubeadmConfigSpec, so the node must self-identify at boot.
        # Primary key: the Hetzner server ID in DMI chassis_serial. Many
        # boards leave it as the placeholder "To Be Filled By O.E.M." (no
        # DMI field carries the server ID), so fall back to matching the
        # node's disk WWNs -- always present in the chart values and
        # readable from /dev/disk/by-id.
        MY_SERVER_ID="$(cat /sys/class/dmi/id/chassis_serial 2>/dev/null || true)"

        MY_PRIVATE_IP=""
        case "$MY_SERVER_ID" in
        {{- range $i, $host := .Values.controlPlane.bareMetal.bareMetalHosts }}
          "{{ $host.serverID }}") MY_PRIVATE_IP="{{ $host.privateIP }}" ;;
        {{- end }}
        esac

        if [ -z "$MY_PRIVATE_IP" ]; then
          # chassis_serial unusable -- match by disk WWN instead.
          DISK_IDS="$(ls /dev/disk/by-id/ 2>/dev/null || true)"
        {{- range $i, $host := .Values.controlPlane.bareMetal.bareMetalHosts }}
        {{- range $wwn := $host.wwns }}
          if [ -z "$MY_PRIVATE_IP" ] && printf '%s\n' "$DISK_IDS" | grep -qiF "{{ $wwn }}"; then
            MY_PRIVATE_IP="{{ $host.privateIP }}"
          fi
        {{- end }}
        {{- end }}
        fi

        if [ -z "$MY_PRIVATE_IP" ]; then
          echo "ERROR: could not resolve privateIP (chassis_serial=$MY_SERVER_ID; no DMI server ID and no matching disk WWN)" >&2
          echo "Node disks: $(ls /dev/disk/by-id/ 2>/dev/null | tr '\n' ' ')" >&2
          echo "Available mappings:" >&2
          {{- range $i, $host := .Values.controlPlane.bareMetal.bareMetalHosts }}
          echo "  serverID={{ $host.serverID }} privateIP={{ $host.privateIP }} wwns=[{{ range $w := $host.wwns }}{{ $w }} {{ end }}]" >&2
          {{- end }}
          exit 1
        fi

        NETWORK_INTERFACE="$(ip route get 8.8.8.8 | awk '{print $5; exit}')"
        cat <<EOF > /etc/netplan/60-vlan.yaml
        network:
          version: 2
          renderer: networkd
          vlans:
            ${NETWORK_INTERFACE}.{{ .Values.bareMetal.vSwitch.vlanID }}:
              id: {{ .Values.bareMetal.vSwitch.vlanID }}
              link: ${NETWORK_INTERFACE}
              mtu: 1400
              addresses:
                - ${MY_PRIVATE_IP}/24
        EOF
        chmod 0600 /etc/netplan/60-vlan.yaml
        netplan apply

        # Substitute the nodeIP placeholder in the shared KubeletConfiguration
        # file (written by the files: block above) with this host's vSwitch
        # privateIP. Workers set the equivalent --node-ip via kubeletExtraArgs
        # at chart-render time because they have a per-host KubeadmConfig;
        # the CP KubeadmConfigSpec is shared, so the field stays as the
        # placeholder until boot. kubelet reads the file when kubeadm
        # init/join starts it for the first time, so its first registration
        # already carries the vSwitch IP as InternalIP.
        sed -i "s|__KUBEAID_NODE_IP__|${MY_PRIVATE_IP}|" /etc/kubernetes/kubelet/config.yaml
      {{- end }}

      - sed -i '/swap/d' /etc/fstab
      - swapoff -a
      - modprobe overlay && modprobe br_netfilter && sysctl --system
      - wget https://github.com/opencontainers/runc/releases/download/v$RUNC/runc.$ARCH
      - wget https://github.com/opencontainers/runc/releases/download/v$RUNC/runc.sha256sum
      - sha256sum --check --ignore-missing runc.sha256sum
      - install runc.$ARCH /usr/local/sbin/runc
      - rm -f runc.$ARCH runc.sha256sum
      - wget https://github.com/containerd/containerd/releases/download/v$CONTAINERD/containerd-$CONTAINERD-linux-$ARCH.tar.gz
      - wget https://github.com/containerd/containerd/releases/download/v$CONTAINERD/containerd-$CONTAINERD-linux-$ARCH.tar.gz.sha256sum
      - sha256sum --check containerd-$CONTAINERD-linux-$ARCH.tar.gz.sha256sum
      - tar -zxf containerd-$CONTAINERD-linux-$ARCH.tar.gz -C /usr/local
      - rm -f containerd-$CONTAINERD-linux-$ARCH.tar.gz containerd-$CONTAINERD-linux-$ARCH.tar.gz.sha256sum
      - mkdir -p /etc/containerd
      - containerd config default > /etc/containerd/config.toml
      - sed -i  "s/SystemdCgroup = false/SystemdCgroup = true/" /etc/containerd/config.toml
      - systemctl daemon-reload && systemctl enable containerd && systemctl start containerd
      - mkdir -p /etc/apt/keyrings/
      - curl -fsSL https://pkgs.k8s.io/core:/stable:/v$TRIMMED_KUBERNETES_VERSION/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      - echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v$TRIMMED_KUBERNETES_VERSION/deb/
        /" | sudo tee /etc/apt/sources.list.d/kubernetes.list
      - apt-get update -y
      - apt-get install -y kubelet="$KUBERNETES_VERSION-*" kubeadm="$KUBERNETES_VERSION-*"
        kubectl="$KUBERNETES_VERSION-*" bash-completion && apt-mark hold kubelet kubectl
        kubeadm && systemctl enable kubelet
      - kubeadm config images pull --kubernetes-version $KUBERNETES_VERSION
      - echo 'source <(kubectl completion bash)' >>/root/.bashrc
      - echo 'export KUBECONFIG=/etc/kubernetes/admin.conf' >>/root/.bashrc
      - apt-get -y autoremove && apt-get -y clean all

      {{/* BUG : The kubeadm-join-config.yaml gets removed before 'kubeadm join' execution. */}}
      {{- if eq .Values.mode "bare-metal" }}
      - |
        [ -f /kubeadm-join-config.yaml ] && \
          mkdir -p /var/run/kubeadm && \
          cp /kubeadm-join-config.yaml /run/kubeadm/kubeadm-join-config.yaml
      {{- end }}

    postKubeadmCommands:
      {{/* On the second or remaining master nodes, after 'kubeadm join' execution,
           we create and apply the netplan config. */}}
      {{- if eq .Values.mode "bare-metal" }}
      - |
        [ -f /run/kubeadm/kubeadm-join-config.yaml ] && \
          chmod +x /bind-floating-ip.sh && \
          /bind-floating-ip.sh
      {{- end }}

      # Install Helm.
      - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 | bash

      # Clone KubeAid. Target dir forced to `kubeaid` (lowercase) so the
      # path references below survive case-sensitive repo URLs (Obmondo's
      # canonical URL ends in `KubeAid.git`). Pinned to
      # global.kubeaid.version when set — keeps the in-node clone on the
      # same release the chart was rendered from. Empty version leaves
      # the clone on master.
      - git clone --depth 1{{ if .Values.global.kubeaid.version }} --branch {{ .Values.global.kubeaid.version }}{{ end }} {{ .Values.global.kubeaid.repo }} kubeaid

      # Copy kubeconfig to ~/.kube/config
      - mkdir -p $HOME/.kube
      - sudo cp -i /etc/kubernetes/admin.conf $HOME/.kube/config
      - sudo chown $(id -u):$(id -g) $HOME/.kube/config

      {{- if and (eq (len $.Values.nodeGroups.hcloud) 0) (eq (len $.Values.nodeGroups.bareMetal) 0) }}
      # Worker-less cluster: the control-plane node is the only node, so it
      # must be eligible as a cloud LoadBalancer backend. kubeadm tags
      # control-plane nodes with
      # node.kubernetes.io/exclude-from-external-load-balancers, which keeps
      # every type=LoadBalancer Service (Traefik etc.) at zero targets; drop
      # it so the CCM can register the node. `|| true` keeps it idempotent
      # across multi-control-plane postKubeadm re-runs.
      - kubectl label nodes --all node.kubernetes.io/exclude-from-external-load-balancers- || true
      {{- end }}

      # Install Cilium.
      #
      # Pattern: `helm template ... | kubectl apply -f -` rather than
      # `helm install`. Two reasons:
      #   - ArgoCD adopts the resources cleanly afterwards. Using `helm
      #     install` here would leave a Helm release secret in
      #     kube-system that ArgoCD would either fight or have to
      #     explicitly ignore on subsequent syncs.
      #   - Keeps the cilium chart's defaults intact — we don't have to
      #     pass `--set hubble.X.enabled=false` to get past
      #     `--wait`/`--rollback-on-failure` semantics where hubble
      #     Deployments stay Pending behind the kubeadm
      #     control-plane:NoSchedule taint (taint gets removed later by
      #     kubeaid-cli's RemoveNoScheduleTaintsFromMasterNodes for
      #     workerless clusters; ArgoCD reconciles hubble pods then).
      #
      # `kubectl rollout status daemonset/cilium` only waits for the
      # cilium agent DS — that's all postKubeadm needs running before
      # CCM install (DS tolerates everything, so it lands fast). Other
      # cilium resources (operator Deployment, hubble) can still be
      # rolling — ArgoCD takes over after this script.
      - kubectl create namespace cilium --dry-run=client -o yaml | kubectl apply -f -
      - API_SERVER_URL=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
      - API_SERVER_HOST=$(echo "$API_SERVER_URL" | awk -F[/:] '{print $4}')
      - API_SERVER_PORT=$(echo "$API_SERVER_URL" | awk -F[/:] '{print $5}')

      - |
        helm template cilium kubeaid/argocd-helm-charts/cilium \
          --namespace cilium \
          --values kubeaid/argocd-helm-charts/cilium/values.yaml \
          --set cilium.kubeProxyReplacement=true \
          --set cilium.k8sServiceHost=${API_SERVER_HOST} \
          --set cilium.k8sServicePort=${API_SERVER_PORT} \
          --set-string cilium.extraArgs[0]="--devices=eth0\,enp+\,eno+" \
          | kubectl apply -f -

      - kubectl -n cilium rollout status daemonset/cilium --timeout=5m

      {{- if or (eq .Values.mode "hcloud") (eq .Values.mode "hybrid") }}
      # Install HCloud Cloud Controller Manager. Same `helm template |
      # kubectl apply` pattern as cilium — ArgoCD adopts cleanly.
      # No rollout wait here: CCM Ready isn't on postKubeadm's critical
      # path; kubeaid-cli's downstream WaitForMainClusterToBeProvisioned
      # waits for the Cluster's overall Provisioned+Ready condition, by
      # which time CCM is up.
      - |
        helm template ccm-hcloud kubeaid/argocd-helm-charts/ccm-hcloud \
          --namespace kube-system \
          --values kubeaid/argocd-helm-charts/ccm-hcloud/values.yaml \
          --set hcloud-cloud-controller-manager.additionalTolerations[0].key=node.kubernetes.io/not-ready \
          --set hcloud-cloud-controller-manager.additionalTolerations[0].operator=Exists \
          --set hcloud-cloud-controller-manager.additionalTolerations[0].effect=NoSchedule \
          --set hcloud-cloud-controller-manager.env.HCLOUD_LOAD_BALANCERS_NETWORK_ZONE.value={{ .Values.hcloud.zone }} \
          --set hcloud-cloud-controller-manager.networking.enabled=true \
          --set hcloud-cloud-controller-manager.networking.network.valueFrom.secretKeyRef.name=cloud-credentials \
          --set hcloud-cloud-controller-manager.networking.network.valueFrom.secretKeyRef.key=network \
          | kubectl apply -f -
      {{- end }}

      {{- if or (eq .Values.mode "bare-metal") (eq .Values.mode "hybrid") }}
      # Install Hetzner Bare Metal Cloud Controller Manager. Same
      # `helm template | kubectl apply` pattern. The wrapper chart now
      # depends on hetznercloud/hcloud-cloud-controller-manager
      # (upstream — gained Robot support + --node-ip forwarding in
      # v1.24.0) instead of the syself fork (itself a fork of the
      # same upstream). The dep is aliased to `ccm-hetzner` so the
      # values key path and this --set flag stay the same as before;
      # privateNetwork.* → networking.* is the only key rename
      # carried over from the schema difference.
      - |
        helm template ccm-hetzner kubeaid/argocd-helm-charts/ccm-hetzner \
          --namespace kube-system \
          --values kubeaid/argocd-helm-charts/ccm-hetzner/values.yaml \
          {{- if (eq .Values.mode "hybrid") }}
          --set ccm-hetzner.networking.enabled=true \
          {{- end }}
          | kubectl apply -f -

      # Install postfinance/kubelet-csr-approver. Same `helm template |
      # kubectl apply` pattern — ArgoCD adopts on its first sync.
      #
      # WHY this lives in postKubeadm (and not as a regular ArgoCD-only
      # app): CAPH's built-in CSR validator denies any kubelet-serving
      # CSR whose SAN includes an IP not present in the HetznerBareMetal
      # Host hardware inventory at provisioning time. That excludes
      # vSwitch sub-interfaces (created by netplan in our preKubeadm),
      # so without a permissive approver running before kubelet's first
      # CSR submission, every node ends up with a stale serving cert
      # and apiserver→kubelet streaming (port-forward, exec, logs)
      # fails with "unable to upgrade connection: Unauthorized" —
      # including the kubectl port-forward to argocd-server itself,
      # which would otherwise be needed to bootstrap ArgoCD. Same
      # bootstrap-paradox the Cilium and CCM blocks above solve.
      #
      # FOLLOW-UP REMOVAL: this whole block and the wrapper chart at
      # argocd-helm-charts/kubelet-csr-approver should be deleted once
      # https://github.com/syself/cluster-api-provider-hetzner/issues/2095
      # lands in CAPH and kubeaid-cli's go.mod bumps to a CAPH version
      # that includes the fix. CAPH's native CSR validator is genuinely
      # stricter than postfinance's IP-prefix allow-list — we only
      # replace it because of the structural vSwitch blind spot. Also
      # remove the matching opt-out / TODO in kubeaid-cli at that point.
      - |
        helm template kubelet-csr-approver kubeaid/argocd-helm-charts/kubelet-csr-approver \
          --namespace kube-system \
          --values kubeaid/argocd-helm-charts/kubelet-csr-approver/values.yaml \
          | kubectl apply -f -
      {{- end }}

      {{- if and (eq .Values.mode "bare-metal") .Values.controlPlane.bareMetal.endpoint.isFailoverIP }}
      # Install hetzner-robot — a CronJob that probes CP health via the
      # apiserver and moves the Robot failover IP back to whichever
      # node is currently the leader. Without this running, a CP
      # reboot leaves the failover IP pointing at a node that no
      # longer holds the apiserver, and every external client (kubectl,
      # ArgoCD CLI, monitoring) hitting failover-IP:6443 fails until
      # an operator manually re-points the IP in Robot.
      #
      # Same `helm template | kubectl apply` pattern as Cilium /
      # CCM / csr-approver — ArgoCD adopts the resources on first
      # sync, after which subsequent updates flow via ArgoCD.
      #
      # Installing in postKubeadm (rather than relying solely on the
      # ArgoCD-managed Application from kubeaid-cli) means the failover
      # logic is active from the first kubeadm-init onward, including
      # the window before ArgoCD itself is fully reconciled.
      - |
        helm template hetzner-robot kubeaid/argocd-helm-charts/hetzner-robot \
          --namespace kube-system \
          --values kubeaid/argocd-helm-charts/hetzner-robot/values.yaml \
          --set failoverIP={{ .Values.controlPlane.bareMetal.endpoint.host }} \
          | kubectl apply -f -
      {{- end }}

      - apt-get -y install socat mtr
      - apt-get -y autoremove && apt-get -y clean all
    {{- if and ($.Values.global.additionalUsers) (gt (len $.Values.global.additionalUsers) 0) }}
    users:
      {{- range $index, $additionalUser := $.Values.global.additionalUsers }}
      - name: {{ $additionalUser.name }}
        sshAuthorizedKeys:
          - {{ $additionalUser.sshPublicKey }}
      {{- end }}
    {{- end }}
  {{- if eq .Values.mode "bare-metal" }}
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: HetznerBareMetalMachineTemplate
        name: {{ .Values.global.clusterName }}-control-plane
  replicas: {{ len .Values.controlPlane.bareMetal.bareMetalHosts }}
  {{/* Bare-metal hosts are finite — every HetznerBareMetalHost is already
       bound to a Machine, so KCP's default surge rollout (maxSurge 1)
       deadlocks: the surge Machine sits in Provisioning with
       "InfrastructureReady: no available host (all hosts are in use)"
       and the rollout never starts. maxSurge 0 switches to a scale-in
       rollout — KCP deletes one outdated control-plane Machine first
       (deprovisioning frees its host), then provisions the replacement
       onto it. During each swap the control plane runs n-1 replicas
       (reduced etcd fault tolerance until the new member joins) — the
       accepted trade-off on fixed hardware. HCloud control-planes keep
       the default surge rollout: a temporary 4th server is cheap and
       avoids the n-1 window entirely. */}}
  rollout:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
  {{- else }}
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: HCloudMachineTemplate
        name: {{ .Values.global.clusterName }}-control-plane
  replicas: {{ .Values.controlPlane.hcloud.replicas }}
  {{- end }}
  version: {{ .Values.global.kubernetes.version }}
