{{/* Handling node-groups in Hetzner Bare Metal. */}}
{{- if or (eq .Values.mode "bare-metal") (eq .Values.mode "hybrid") }}
{{- range $nodeGroupIndex, $nodeGroup := $.Values.nodeGroups.bareMetal }}
{{- range $hostIndex, $host := $nodeGroup.bareMetalHosts }}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfig
metadata:
  name: {{ printf "%s-%s-%s" $.Values.global.clusterName $nodeGroup.name $host.serverID }}
spec:
  files:
    {{/* Hardened kubelet config delivered as a typed KubeletConfiguration
         file rather than dozens of map-style kubeletExtraArgs. Same
         security profile upstream CAPH ships in its md-0
         KubeadmConfigTemplate (anonymous=false, webhook auth/authz,
         eventRecordQPS=5, readOnlyPort=0, serverTLSBootstrap=true,
         explicit cipher-suite allow-list). maxPods=220 because these
         are worker nodes. kubelet is pointed at this file via --config
         in kubeletExtraArgs below.

         When --config points here, kubelet reads ONLY this file —
         kubeadm's auto-generated config (and its defaults) is ignored
         end-to-end, so every kubeadm-required field must be restated
         (mirror KubeadmControlPlane.yaml's matching block). Omitting
         clusterDNS made kubelet silently degrade ClusterFirst pods to
         the node's resolvConf (1.1.1.1): cluster Service names stopped
         resolving on workers, e.g. ArgoCD's app-controller failing with
         "lookup argocd-redis on 1.1.1.1:53: no such host" and gRPC
         dials to argocd-repo-server producing zero addresses. */}}
    - path: /etc/kubernetes/kubelet/config.yaml
      owner: "root:root"
      permissions: "0644"
      content: |
        apiVersion: kubelet.config.k8s.io/v1beta1
        kind: KubeletConfiguration
        authentication:
          anonymous:
            enabled: false
          webhook:
            enabled: true
          x509:
            clientCAFile: /etc/kubernetes/pki/ca.crt
        authorization:
          mode: Webhook
        cgroupDriver: systemd
        clusterDNS:
          - 10.96.0.10
        clusterDomain: cluster.local
        containerRuntimeEndpoint: unix:///var/run/containerd/containerd.sock
        eventRecordQPS: 5
        maxPods: 220
        readOnlyPort: 0
        resolvConf: /etc/kubernetes/resolv.conf
        rotateCertificates: true
        serverTLSBootstrap: true
        tlsCipherSuites:
          - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
          - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
          - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
          - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
          - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
          - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
          - TLS_RSA_WITH_AES_256_GCM_SHA384
          - TLS_RSA_WITH_AES_128_GCM_SHA256
    - content: |
        net.ipv4.conf.lxc*.rp_filter = 0
      owner: root:root
      path: /etc/sysctl.d/99-cilium.conf
      permissions: "0744"
    - content: |
        overlay
        br_netfilter
      owner: root:root
      path: /etc/modules-load.d/crio.conf
      permissions: "0744"
    - content: |
        net.bridge.bridge-nf-call-iptables  = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward                 = 1
      owner: root:root
      path: /etc/sysctl.d/99-kubernetes-cri.conf
      permissions: "0744"
    - content: |
        vm.overcommit_memory=1
        kernel.panic=10
        kernel.panic_on_oops=1
        # Kernel defaults (128 instances) are too low for dense k8s nodes;
        # exhausting fs.inotify.max_user_instances wedges kubelet's CSI
        # plugin-watcher. 8192 / 524288 is the k8s-ecosystem standard.
        fs.inotify.max_user_instances=8192
        fs.inotify.max_user_watches=524288
      owner: root:root
      path: /etc/sysctl.d/99-kubelet.conf
      permissions: "0744"
    - content: |
        nameserver 1.1.1.1
        nameserver 1.0.0.1
        nameserver 2606:4700:4700::1111
      owner: root:root
      path: /etc/kubernetes/resolv.conf
      permissions: "0744"
    - content: |
        # Copyright The containerd Authors.
        #
        # Licensed under the Apache License, Version 2.0 (the "License");
        # you may not use this file except in compliance with the License.
        # You may obtain a copy of the License at
        #
        #     http://www.apache.org/licenses/LICENSE-2.0
        #
        # Unless required by applicable law or agreed to in writing, software
        # distributed under the License is distributed on an "AS IS" BASIS,
        # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        # See the License for the specific language governing permissions and
        # limitations under the License.
        #
        # https://raw.githubusercontent.com/containerd/containerd/main/containerd.service

        [Unit]
        Description=containerd container runtime
        Documentation=https://containerd.io
        After=network.target local-fs.target dbus.service

        [Service]
        ExecStartPre=-/sbin/modprobe overlay
        ExecStart=/usr/local/bin/containerd

        Type=notify
        Delegate=yes
        KillMode=process
        Restart=always
        RestartSec=5

        # Having non-zero Limit*s causes performance problems due to accounting overhead
        # in the kernel. We recommend using cgroups to do container-local accounting.
        LimitNPROC=infinity
        LimitCORE=infinity

        # Comment TasksMax if your systemd version does not supports it.
        # Only systemd 226 and above support this version.
        TasksMax=infinity
        OOMScoreAdjust=-999

        [Install]
        WantedBy=multi-user.target
      owner: root:root
      path: /etc/systemd/system/containerd.service
      permissions: "0744"
  joinConfiguration:
    nodeRegistration:
      kubeletExtraArgs:
        - name: config
          value: /etc/kubernetes/kubelet/config.yaml
        - name: node-ip
          value: {{ $host.privateIP | quote }}
        - name: anonymous-auth
          value: "false"
        - name: authentication-token-webhook
          value: "true"
        - name: authorization-mode
          value: Webhook
        - name: cloud-provider
          value: external
        - name: event-qps
          value: "5"
        - name: kubeconfig
          value: /etc/kubernetes/kubelet.conf
        - name: max-pods
          value: "220"
        - name: read-only-port
          value: "0"
        - name: resolv-conf
          value: /etc/kubernetes/resolv.conf
        - name: rotate-server-certificates
          value: "true"
        - name: tls-cipher-suites
          value: TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_RSA_WITH_AES_256_GCM_SHA384,TLS_RSA_WITH_AES_128_GCM_SHA256
  preKubeadmCommands:
    - set -x

    {{/* Give highest priority to the Network Card / Connection entry in the boot order.
          Otherwise, we cannot boot the servers into rescue mode, and need to reach out to the
          Hetzner support team. */}}
    - |
      if [ ! -d /sys/firmware/efi ]; then
        echo "legacy BIOS boot — skipping EFI boot-order adjustment"
      else
        NETBOOT=$(efibootmgr -v \
          | grep -E "Network (Card|Connection)" \
          | sed 's/Boot\([0-9A-F]*\).*/\1/' \
          | head -n1)
        if [ -z "$NETBOOT" ]; then
          echo "no EFI network boot entry found — skipping boot-order adjustment"
        else
          CURRENT_ORDER=$(efibootmgr | grep "BootOrder:" | cut -d' ' -f2)
          NEW_ORDER=$(echo "$CURRENT_ORDER" | sed "s/$NETBOOT,\?//g" | sed "s/^/$NETBOOT,/" | sed 's/,$//')
          efibootmgr -o "$NEW_ORDER"
        fi
      fi

    - export NETWORK_INTERFACE=$(ip route get 8.8.8.8 | awk '{print $5; exit}')

    {{- if or (eq $.Values.mode "hybrid") (and (eq $.Values.mode "bare-metal") $.Values.bareMetal.vSwitch) }}
    {{/* Bring up the VLAN sub-interface for the Hetzner vSwitch.
         Required for both hybrid (vSwitch bridges bare-metal nodes onto
         the HCloud network) and pure bare-metal with vSwitch (inter-
         node private path). Without this address the node has no
         InternalIP — kubelet only advertises Hostname + ExternalIP,
         which means every apiserver→kubelet call (port-forward, exec,
         logs) is dialled via the worker's public IP and lands on
         kubelet's serving cert whose SAN doesn't cover that path.
         Pure-bare-metal previously skipped this block entirely; the
         resulting node has no 10.0.1.x address and kubeaid-cli's
         workload-cluster steps (ArgoCD install in particular) fail
         with "SPDY upgrade failed: 401 Unauthorized" coming from
         the apiserver's streamtunnel.

         The NAT-gateway-egress routes (10.0.0.0/16 + default via
         10.0.1.1) belong only to hybrid — pure bare-metal nodes
         keep their default route on the public NIC. */}}
    - |
      cat <<EOF > /etc/netplan/60-vlan.yaml
      network:
        version: 2
        renderer: networkd
        vlans:
          ${NETWORK_INTERFACE}.{{ $.Values.bareMetal.vSwitch.vlanID }}:
            id: {{ $.Values.bareMetal.vSwitch.vlanID }}
            link: ${NETWORK_INTERFACE}
            mtu: 1400
            addresses:
              - {{ $host.privateIP }}/24
      {{- if (eq $.Values.mode "hybrid") }}
            routes:
              - to: 10.0.0.0/16
                via: 10.0.1.1
              - to: 0.0.0.0/0
                via: 10.0.1.1
                metric: 200
            nameservers:
              addresses:
                - 185.12.64.1
                - 185.12.64.2
      {{- end }}
      EOF
      chmod 0600 /etc/netplan/60-vlan.yaml
      netplan apply
    {{- end -}}

    {{/*
      User provided commands used to setup the disk layout.
      We recommend the following :

        (1) If NVMe, then create a ZPool out of the available storage space.
            That ZPool will be used by Kubernetes ephemeral volumes, pod logs and OpenEBS ZFS
            LocalPV provisioner.

        (2) If HDD / regular SSD, then create a partition out of the available storage space,
            allocating it to Rook Ceph.
    */}}
    - |
        # Fail loudly if the storagectl download (or the planner itself) fails.
        # See the matching block in KubeadmControlPlane.yaml for the full
        # rationale — same failure mode (silent ZFS-less node) applied to
        # worker node-groups.
        #
        # Subshell-wrapped so `set -euo pipefail` doesn't leak into later
        # runcmd entries (cloud-init concatenates all entries into one
        # script — nounset would then break `$HOME` and other later refs).
        (
          set -euo pipefail
          STORAGECTL_ARCH="$(uname -m)"
          case "$STORAGECTL_ARCH" in aarch64) STORAGECTL_ARCH=arm64 ;; esac
          STORAGECTL_URL="https://github.com/Obmondo/kubeaid-cli/releases/{{ if $.Values.global.kubeaidStoragectl.version }}download/{{ $.Values.global.kubeaidStoragectl.version }}{{ else }}latest/download{{ end }}/kubeaid-storagectl_Linux_${STORAGECTL_ARCH}"
          wget -O kubeaid-storagectl "$STORAGECTL_URL" || { echo "ERROR: kubeaid-storagectl download failed from $STORAGECTL_URL" >&2; exit 1; }
          [ -s kubeaid-storagectl ] || { echo "ERROR: kubeaid-storagectl downloaded empty (likely 404) from $STORAGECTL_URL" >&2; exit 1; }
          chmod +x ./kubeaid-storagectl
          ./kubeaid-storagectl plan execute --os-size {{ $.Values.bareMetal.installImage.vg0.size }} --zfs-pool-size {{ $nodeGroup.zfs.size }}
        )

    - grep VERSION= /etc/os-release; uname -a
    - export CONTAINERD=2.2.3
    - export RUNC=1.2.5
    - export KUBERNETES_VERSION=$(echo {{ $.Values.global.kubernetes.version }} | sed 's/^v//')
    - export TRIMMED_KUBERNETES_VERSION=$(echo {{ $.Values.global.kubernetes.version }} | sed 's/^v//'
      | awk -F . '{print $1 "." $2}')
    - ARCH="$(dpkg --print-architecture)"
    - localectl set-locale LANG=en_US.UTF-8
    - localectl set-locale LANGUAGE=en_US.UTF-8
    - apt-get update -y
    - apt-get -y install at jq unzip wget socat mtr logrotate apt-transport-https
    - sed -i '/swap/d' /etc/fstab
    - swapoff -a
    - modprobe overlay && modprobe br_netfilter && sysctl --system
    - wget https://github.com/opencontainers/runc/releases/download/v$RUNC/runc.$ARCH
    - wget https://github.com/opencontainers/runc/releases/download/v$RUNC/runc.sha256sum
    - sha256sum --check --ignore-missing runc.sha256sum
    - install runc.$ARCH /usr/local/sbin/runc
    - rm -f runc.$ARCH runc.sha256sum
    - wget https://github.com/containerd/containerd/releases/download/v$CONTAINERD/containerd-$CONTAINERD-linux-$ARCH.tar.gz
    - wget https://github.com/containerd/containerd/releases/download/v$CONTAINERD/containerd-$CONTAINERD-linux-$ARCH.tar.gz.sha256sum
    - sha256sum --check containerd-$CONTAINERD-linux-$ARCH.tar.gz.sha256sum
    - tar -zxf containerd-$CONTAINERD-linux-$ARCH.tar.gz -C /usr/local
    - rm -f containerd-$CONTAINERD-linux-$ARCH.tar.gz containerd-$CONTAINERD-linux-$ARCH.tar.gz.sha256sum
    - mkdir -p /etc/containerd
    - containerd config default > /etc/containerd/config.toml
    - sed -i  "s/SystemdCgroup = false/SystemdCgroup = true/" /etc/containerd/config.toml
    - systemctl daemon-reload && systemctl enable containerd && systemctl start
      containerd
    - mkdir -p /etc/apt/keyrings/
    - curl -fsSL https://pkgs.k8s.io/core:/stable:/v$TRIMMED_KUBERNETES_VERSION/deb/Release.key
      | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    - echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v$TRIMMED_KUBERNETES_VERSION/deb/
      /" | sudo tee /etc/apt/sources.list.d/kubernetes.list
    - apt-get update
    - apt-get install -y kubelet="$KUBERNETES_VERSION-*" kubeadm="$KUBERNETES_VERSION-*"
      kubectl="$KUBERNETES_VERSION-*" bash-completion && apt-mark hold kubelet kubectl
      kubeadm && systemctl enable kubelet
    - kubeadm config images pull --kubernetes-version $KUBERNETES_VERSION
    - echo 'source <(kubectl completion bash)' >>/root/.bashrc
    - echo 'export KUBECONFIG=/etc/kubernetes/admin.conf' >>/root/.bashrc
    - apt-get -y autoremove && apt-get -y clean all
    {{- if (gt (len $.Values.global.additionalUsers) 0) }}
    users:
      {{- range $index, $additionalUser := $.Values.global.additionalUsers }}
      - name: {{ $additionalUser.name }}
        sshAuthorizedKeys:
          - {{ $additionalUser.sshPublicKey }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
