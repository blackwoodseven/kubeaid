{{- if or (eq .Values.mode "bare-metal") (eq .Values.mode "hybrid") }}
{{- range $nodeGroupIndex, $nodeGroup := $.Values.nodeGroups.bareMetal }}
{{- range $hostIndex, $host := $nodeGroup.bareMetalHosts }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: HetznerBareMetalMachine
metadata:
  name: {{ printf "%s-%s-%s" $.Values.global.clusterName $nodeGroup.name $host.serverID }}
spec:
  hostSelector:
    matchLabels:
      role: {{ printf "%s-%s" $.Values.global.clusterName $nodeGroup.name }}
      host: {{ $host.serverID | quote }}
  installImage:
    image:
      path: {{ $.Values.bareMetal.installImage.imagePath }}
    partitions:
      - fileSystem: esp
        mount: /boot/efi
        size: 512M
      - fileSystem: ext4
        mount: /boot
        size: 1024M
      # Logical Volume Group.
      - fileSystem: vg0
        mount: lvm
        size: {{ $.Values.bareMetal.installImage.vg0.size }}G
    logicalVolumeDefinitions:
      # The Operating System (OS).
      - vg: vg0
        name: root
        mount: /
        filesystem: ext4
        size: {{ $.Values.bareMetal.installImage.vg0.rootVolumeSize }}G
    postInstallScript: |
      #!/bin/bash

      {{- include "hetzner.efiBootOrderScript" . | nindent 6 }}

      mkdir -p /etc/cloud/cloud.cfg.d && touch /etc/cloud/cloud.cfg.d/99-custom-networking.cfg
      echo "network: { config: disabled }" > /etc/cloud/cloud.cfg.d/99-custom-networking.cfg

      apt-get update && apt-get install -y cloud-init apparmor apparmor-utils

      {{/* Hetzner's OS images ship a prebuilt host-only dracut initramfs from
           their image-build machine, whose devexists hooks are pinned to THAT
           machine's ESP UUID. On UEFI hosts the initramfs then waits ~3min for
           a partition that doesn't exist and drops to the dracut emergency
           shell — the server looks dead from outside. apt's update-initramfs
           run does not replace those hooks; only a forced dracut rebuild
           against this host does. */}}
      dracut --force --regenerate-all

      cloud-init clean --logs
    swraid: 1
    swraidLevel: {{ ($nodeGroup.raid).level | default 1 }}
  sshSpec:
    portAfterCloudInit: 22
    portAfterInstallImage: 22
    secretRef:
      key:
        name: sshkey-name
        privateKey: ssh-privatekey
        publicKey: ssh-publickey
      name: {{ $.Values.sshKeyPair.secretName }}
{{- end }}
{{- end }}
{{- end }}
