{{- if eq .Values.mode "bare-metal" }}
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: HetznerBareMetalMachineTemplate
metadata:
  name: {{ .Values.global.clusterName }}-control-plane
spec:
  template:
    {{/* Currently, Cluster API Provider Hetzner (CAPH) doesn't support having the metadata field
         here. I've opened an issue for this here : https://github.com/syself/cluster-api-provider-hetzner/issues/1680. */}}
    {{/* metadata: */}}
    {{/*   labels: */}}
    {{/*     node.cluster.x-k8s.io/cloud-provider: hetzner-bare-metal */}}
    spec:
      hostSelector:
        matchLabels:
          role: {{ $.Values.global.clusterName }}-control-plane
      installImage:
        image:
          path: {{ .Values.bareMetal.installImage.imagePath }}
        partitions:
          - fileSystem: esp
            mount: /boot/efi
            size: 512M
          - fileSystem: ext4
            mount: /boot
            size: 1024M
          # Logical Volume Group.
          - fileSystem: vg0
            mount: lvm
            size: {{ .Values.bareMetal.installImage.vg0.size }}G
        logicalVolumeDefinitions:
          # The Operating System (OS).
          - vg: vg0
            name: root
            mount: /
            filesystem: ext4
            size: {{ .Values.bareMetal.installImage.vg0.rootVolumeSize }}G
        postInstallScript: |
          #!/bin/bash

          {{- include "hetzner.efiBootOrderScript" . | nindent 10 }}

          mkdir -p /etc/cloud/cloud.cfg.d && touch /etc/cloud/cloud.cfg.d/99-custom-networking.cfg
          echo "network: { config: disabled }" > /etc/cloud/cloud.cfg.d/99-custom-networking.cfg

          apt-get update && apt-get install -y cloud-init apparmor apparmor-utils

          {{/* Hetzner's OS images ship a prebuilt host-only dracut initramfs
               from their image-build machine, whose devexists hooks are pinned
               to THAT machine's ESP UUID. On UEFI hosts the initramfs then
               waits ~3min for a partition that doesn't exist and drops to the
               dracut emergency shell — the server looks dead from outside.
               apt's update-initramfs run does not replace those hooks; only a
               forced dracut rebuild against this host does. */}}
          dracut --force --regenerate-all

          cloud-init clean --logs
        swraid: 1
        swraidLevel: {{ (.Values.controlPlane.bareMetal.raid).level | default 1 }}
      sshSpec:
        portAfterCloudInit: 22
        portAfterInstallImage: 22
        secretRef:
          key:
            name: sshkey-name
            privateKey: ssh-privatekey
            publicKey: ssh-publickey
          name: {{ $.Values.sshKeyPair.secretName }}
{{- end }}
