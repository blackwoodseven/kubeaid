{{/* Control-plane MHC for clusters with the control-plane in HCloud. */}}
{{- if or (eq .Values.mode "hcloud") (eq .Values.mode "hybrid") }}
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineHealthCheck
metadata:
  name: {{ .Values.global.clusterName }}-control-plane-unhealthy-5m
spec:
  clusterName: {{ .Values.global.clusterName }}
  checks:
    nodeStartupTimeoutSeconds: 900
    unhealthyNodeConditions:
    - status: Unknown
      timeoutSeconds: 180
      type: Ready
    - status: "False"
      timeoutSeconds: 180
      type: Ready
  remediation:
    triggerIf:
      unhealthyLessThanOrEqualTo: 100%
  selector:
    matchLabels:
      cluster.x-k8s.io/control-plane: ""
{{- end }}

{{/* Control-plane MHC for clusters with the control-plane on Hetzner bare-metal. */}}
{{- if eq .Values.mode "bare-metal" }}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineHealthCheck
metadata:
  name: {{ .Values.global.clusterName }}-control-plane-unhealthy-5m
spec:
  clusterName: {{ .Values.global.clusterName }}
  checks:
    {{/* A bare-metal provision (rescue boot -> install-image -> reboot ->
         cloud-init -> kubeadm join) takes 20-40 minutes. The 900s HCloud
         default declares every replacement Machine failed-to-start at the
         15-minute mark, so KCP remediates it mid-install and the rollout
         loops: reinstall -> reaped -> retry, re-imaging the same host
         forever. One hour covers the slowest observed installs with
         headroom while still catching genuinely dead hardware. */}}
    nodeStartupTimeoutSeconds: 3600
    unhealthyNodeConditions:
    - status: Unknown
      timeoutSeconds: 180
      type: Ready
    - status: "False"
      timeoutSeconds: 180
      type: Ready
  remediation:
    triggerIf:
      unhealthyLessThanOrEqualTo: 100%
  selector:
    matchLabels:
      cluster.x-k8s.io/control-plane: ""
{{- end }}

{{/* Worker MHC — one per HCloud nodeGroup, scoped to that group's
     MachineDeployment via the `nodepool: <cluster>-<nodegroup>` label
     both this selector and MachineDeployment.metadata.labels share. */}}
{{- if or (eq .Values.mode "hcloud") (eq .Values.mode "hybrid") }}
{{- range $nodeGroupIndex, $nodeGroup := $.Values.nodeGroups.hcloud }}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineHealthCheck
metadata:
  name: {{ printf "%s-%s-unhealthy-5m" $.Values.global.clusterName $nodeGroup.name }}
spec:
  clusterName: {{ $.Values.global.clusterName }}
  checks:
    nodeStartupTimeoutSeconds: 600
    unhealthyNodeConditions:
    - status: Unknown
      timeoutSeconds: 180
      type: Ready
    - status: "False"
      timeoutSeconds: 180
      type: Ready
  remediation:
    triggerIf:
      unhealthyLessThanOrEqualTo: 100%
  selector:
    matchLabels:
      nodepool: {{ printf "%s-%s" $.Values.global.clusterName $nodeGroup.name }}
{{- end }}
{{- end }}
