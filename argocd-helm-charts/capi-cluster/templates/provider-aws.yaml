{{- if (.Values.provider).aws }}

{{- $name := "aws" }}
{{- /* Namespace defaults to "capi-cluster". Existing deployments that
       used the old per-customer suffix (e.g. capi-cluster-enableit) can
       opt back in by setting global.capiClusterNamespace in values. */ -}}
{{- $namespace := default "capi-cluster" .Values.global.capiClusterNamespace }}

apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
spec:
  configSecret:
    name: {{ .Values.aws.secretName }}
    namespace: {{ $namespace }}
  version: {{ .Values.global.capa.version }}
  fetchConfig:
    url: https://github.com/kubernetes-sigs/cluster-api-provider-aws/releases/{{ .Values.global.capa.version }}/infrastructure-components.yaml
  deployment:
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
  manager:
    cacheNamespace: {{ $namespace }}
    metrics:
      bindAddress: ":8181"
    syncPeriod: 10m0s
    featureGates:
      MachinePool: {{ .Values.global.capa.enableMachinePools }}
{{- end }}
