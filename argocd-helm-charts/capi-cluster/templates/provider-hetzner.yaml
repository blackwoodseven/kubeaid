{{- if (.Values.provider).hetzner }}

{{- $name := "hetzner" }}
{{- /* Namespace defaults to "capi-cluster". Existing deployments that
       used the old per-customer suffix (e.g. capi-cluster-enableit) can
       opt back in by setting global.capiClusterNamespace in values. */ -}}
{{- $namespace := default "capi-cluster" .Values.global.capiClusterNamespace }}

{{- $image := printf "ghcr.io/syself/caph:%s" .Values.global.caph.version }}

apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
spec:
  configSecret:
    name: {{ .Values.hetzner.cloudCredentialsSecretName }}
    namespace: {{ $namespace }}
  version: {{ .Values.global.caph.version }}
  fetchConfig:
    url: https://github.com/syself/cluster-api-provider-hetzner/releases/download/{{ .Values.global.caph.version }}/infrastructure-components.yaml
  manager:
    cacheNamespace: {{ $namespace }}
    # BUG : ClusterAPI renders --metrics-bind-addr but CAPH wants --metrics-bind-address.
    # metrics:
    #   bindAddress: ":8181"
    # syncPeriod: 10m0s
  manifestPatches:
    - |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: caph-controller-manager
        namespace: {{ $namespace }}
      spec:
        template:
          spec:
            containers:
            - args:
                - --leader-elect=true
                - --namespace={{ $namespace }}
              command:
                - /manager
              image: {{ $image }}
              imagePullPolicy: IfNotPresent
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: healthz
                  scheme: HTTP
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              name: manager
              ports:
                - containerPort: 9443
                  name: webhook-server
                  protocol: TCP
                - containerPort: 9440
                  name: healthz
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /readyz
                  port: healthz
                  scheme: HTTP
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              resources:
                limits:
                  cpu: 150m
                  memory: 250Mi
                requests:
                  cpu: 100m
                  memory: 100Mi
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: FallbackToLogsOnError
              volumeMounts:
              - mountPath: /tmp/k8s-webhook-server/serving-certs
                name: cert
                readOnly: true
{{- end }}
