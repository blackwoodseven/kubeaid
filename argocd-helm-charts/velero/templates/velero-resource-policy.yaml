apiVersion: v1
kind: ConfigMap
metadata:
  name: cnpg-skip-volumes
  namespace: velero
  labels:
    argocd.argoproj.io/instance: velero
data:
  # Skip Velero volume backups for CloudNativePG PVCs (covered by CNPG's own WAL/base backups).
  policy.yaml: |
    version: v1
    volumePolicies:
    {{- if .Values.skipVolumePolicies }}
    {{- range .Values.skipVolumePolicies }}
      - conditions:
          pvcLabels:
            {{- range $key, $value := . }}
            {{ $key }}: {{ $value | quote }}
            {{- end }}
        action:
          type: skip
    {{- end }}
    {{- else }}
      []
    {{- end }}
