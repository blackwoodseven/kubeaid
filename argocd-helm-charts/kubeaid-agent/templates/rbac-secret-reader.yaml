{{/* The agent reads secrets in its own namespace — the ArgoCD project-role JWT
     lives here (kubeaid-cli ≥ v0.22.4) — and in any extra namespaces listed in
     .Values.extraSecretReaderNamespaces. A namespaced Role + RoleBinding pair
     is created per namespace, so the access stays scoped to exactly those
     namespaces. */}}
{{- range $namespace := concat (list .Release.Namespace) (.Values.extraSecretReaderNamespaces | default list) | uniq }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubeaid-agent.fullname" $ }}-secret-reader
  namespace: {{ $namespace }}
  labels:
    {{- include "kubeaid-agent.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubeaid-agent.fullname" $ }}-secret-reader
  namespace: {{ $namespace }}
  labels:
    {{- include "kubeaid-agent.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeaid-agent.fullname" $ }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubeaid-agent.fullname" $ }}-secret-reader
{{- end }}
