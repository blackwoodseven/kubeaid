nameOverride: ""
fullnameOverride: ""

# -- KubeAid Agent config file contents.
appConfig:
  argocd:
    # -- Name of the Kubernetes Secret (in argocd namespace) containing the ArgoCD auth token
    # under the "token" key.
    authTokenSecretName: argocd-project-role-kubeaid-agent

    plainText: false

  server:
    port: 4000

  obmondoAPI:
    url: https://api.obmondo.com/api
    tls:
      keyFile: /etc/kubeaid-agent/obmondo-api/tls.key
      certFile: /etc/kubeaid-agent/obmondo-api/tls.crt
      caCertFile: /etc/kubeaid-agent/obmondo-api/ca.crt

  puppetConfigDetails:
    url:
    facts:
      - os
      - networking
      - ipaddress
      - hostname
      - domain
      - obmondo_customer
      - obmondo_system
    runKubeAidPuppetSync: false

  kubeaidUpdate:
    # -- Cadence at which the agent polls Obmondo API for an active KubeAid update
    # service window. Short enough to react inside a window's granularity, long
    # enough not to thrash the API when no window is open.
    checkInterval: 15m

# -- Kubernetes Secret name containing the TLS certificate key-pair, used to communicate with
# Obmondo API.
obmondoAPITLSSecretName: obmondo-clientcert

# -- Extra namespaces where the agent's ServiceAccount may read secrets.
# A Role + RoleBinding (get/list/watch on secrets) is created in each.
# The target namespaces must already exist. Useful for cross-namespace
# secret reads (e.g. obmondo-websites).
extraSecretReaderNamespaces: []
#  - obmondo-websites

configMap:
  labels: {}
  annotations: {}

deployment:
  replicas: 1

  podLabels: {}
  podAnnotations: {}

  imagePullSecrets: []

  podSecurityContext:
    runAsNonRoot: true
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  image:
    repository: ghcr.io/obmondo/kubeaid-agent
    tag: v0.4.2
    pullPolicy: Always

  env: []

  securityContext:
    privileged: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop: ["ALL"]

  probes:
    readiness:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    liveness:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 2
      successThreshold: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  extraVolumes: []

  terminationGracePeriodSeconds: 10

  nodeSelector: {}
  affinity: {}
  tolerations: []

service:
  labels: {}
  annotations: {}

  port: 80

serviceMonitor:
  enabled: true

  labels: {}
  annotations: {}

  interval: 30s
  scrapeTimeout: 10s
