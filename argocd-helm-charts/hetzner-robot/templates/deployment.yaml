---
{{- if .Values.failoverIP | trim | eq "" }}
{{- fail "failoverIP must be provided" }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-failover
  labels:
    app: {{ .Release.Name }}-failover
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-failover
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-failover
    spec:
      # v1.2.0+ resolves this node's public ExternalIP via the Kubernetes API
      # (GET nodes), so the pod runs as a ServiceAccount with that RBAC (rbac.yaml).
      serviceAccountName: {{ .Release.Name }}-failover
      containers:
      - name: {{ .Release.Name }}-failover
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        env:
        - name: FAILOVER_IP
          value: {{ .Values.failoverIP }}
        - name: CRON_TIME_INTERVAL
          value: {{ .Values.cronTimeInterval }}
        # v1.2.0 looks this node up by name to read its public ExternalIP from
        # the Kubernetes API; it no longer uses the private status.hostIP.
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: HETZNER_ROBOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudCredentialsSecretName }}
              key: robot-user
        - name: HETZNER_ROBOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudCredentialsSecretName }}
              key: robot-password
        - name: HETZNER_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudCredentialsSecretName }}
              key: hcloud
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "pgrep hetzner-failover"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "pgrep hetzner-failover"
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      # The failover pod is pinned to control-plane nodes (nodeSelector above),
      # so it must also tolerate their NoSchedule taint — otherwise the
      # scheduler filters out every eligible node and the pod stays Pending.
      # "master" is the pre-1.24 spelling of the same taint, kept for older
      # clusters that still carry it.
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
