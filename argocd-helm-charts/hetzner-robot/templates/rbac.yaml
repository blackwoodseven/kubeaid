{{- /* The v1.2.0 failover script resolves this node's public ExternalIP by
     GET-ing its Node object from the Kubernetes API (status.addresses ->
     ExternalIP), instead of reading the private status.hostIP. The pod
     therefore runs as this ServiceAccount, granted the minimum it needs:
     cluster-wide "get" on nodes (a single GET /api/v1/nodes/<NODE_NAME>). */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-failover
  labels:
    app: {{ .Release.Name }}-failover
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-failover
  labels:
    app: {{ .Release.Name }}-failover
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-failover
  labels:
    app: {{ .Release.Name }}-failover
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-failover
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-failover
    namespace: {{ .Release.Namespace }}
