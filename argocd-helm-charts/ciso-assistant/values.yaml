---
global:
  netpol:
    enabled: false
  ciso-assistant:
    netpol: false

  postgresql:
    enabled: true
    instanceName: ciso-assistant
    instances: 1
    monitoring:
      enablePodMonitor: true
    size: 5Gi
    recover:
      enabled: false
    backups:
      enabled: false
      schedule: "0 2 * * *"
      retentionPolicy: 30d
      provider: aws
      aws:
        enableKube2IAMIntegration: true
    logicalbackup:
      enabled: false
      schedule: "0 2 * * *"
      provider: s3
      retention: "30d"
    resources:
      limits:
        memory: 1000Mi
        cpu: 500m
      requests:
        memory: 500Mi
        cpu: 250m

ciso-assistant-next:
  backend:
    config:
      databaseType: externalPgsql
    persistence:
      sqlite:
        enabled: true
  frontend:
    postgresql:
      enabled: false
  externalPgsql:
    host: ciso-assistant-pgsql-rw
    port: 5432
    user: ciso-assistant
    database: ciso-assistant
    create: false
    existingSecret: ciso-assistant-pgsql-app
  ingress:
    enabled: true


networkPolicy:
  enabled: false
