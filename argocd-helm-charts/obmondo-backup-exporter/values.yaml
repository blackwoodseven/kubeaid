# Default values for obmondo-backup-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: obmondo-backup-exporter
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v1.0.0"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8080

resources: {}
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /readyz
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

exporter:
  debug: false
  postgres:
    # Maximum acceptable Recovery Point Objective (RPO) for PostgreSQL backups.
    # Supported formats: "24h", "6h", "30m", "1d", "7d"
    max_rpo: 26h

    # Note: This value is also used in prometheusRule.alerts to check if latest
    # backup age exceeds RPO.

    # Rate at which the exporter checks backup health, expressed as a fraction
    # of max_rpo. For example, 0.25 means the exporter runs every 25% of
    # max_rpo (e.g. every 6h if max_rpo is 24h), giving multiple chances to
    # detect a missed backup before the RPO window expires.
    # Must be between 0 and 1. Defaults to 0.25 (every 25% of max_rpo) if
    # not set
    interval_rate: 0.25

    logical:
      # Map of clusters to ignore for logical backups.
      # Keys are namespace names, values are cluster names.
      # For example:
      #   mattermost:
      #     - mattermost-staging
      #     - mattermost-dev
      # Leave empty to watch all clusters.
      ignore_clusters: {}
      # S3 configuration for logical backups (POSTGRES_S3_LOGICAL_*).
      s3:
        secretName: ""
        accessKeyId: ""
        secretAccessKey: ""
    wal:
      # Map of clusters to ignore for WAL backups.
      # Keys are namespace names, values are cluster names.
      ignore_clusters: {}
      # S3 configuration for WAL backups (POSTGRES_S3_WAL_*).
      s3:
        secretName: ""
        accessKeyId: ""
        secretAccessKey: ""
  velero:
    # Maximum acceptable Recovery Point Objective (RPO) for Velero backups.
    # Supported formats: "24h", "6h", "30m", "1d", "7d"
    max_rpo: 26h

    # Rate at which the exporter checks backup health, expressed as a fraction
    # of max_rpo. For example, 0.25 means the exporter runs every 25% of
    # max_rpo (e.g. every 6h if max_rpo is 24h), giving multiple chances to
    # detect a missed backup before the RPO window expires.
    # Must be between 0 and 1. Defaults to 0.25 (every 25% of max_rpo) if
    # not set
    interval_rate: 0.25

    # Namespaces to ignore in Velero backup checks.
    # PVCs in these namespaces will not be checked.
    # Example: ["kube-system", "velero"]
    ignore_namespaces: []

    # S3 configuration.
    # Credentials can be provided either via a Kubernetes Secret (secretName)
    # or directly as values (accessKeyId, secretAccessKey, region, bucket)
    # for testing purposes. The S3 endpoint URL is always provided directly.
    s3:
      # S3 endpoint URL (eg. https://s3.example.com).
      url: ""
      # Name of the Kubernetes Secret containing S3 credentials.
      # Expected secret keys:
      #   access-key-id, secret-access-key, region, bucket
      secretName: ""
      # Direct values for testing (used when secretName is empty).
      accessKeyId: ""
      secretAccessKey: ""
      region: ""
      bucket: ""

# PrometheusRule for alerting
prometheusRule:
  enabled: true
  postgres:
    enabled: true
    labels: {}
    severity: critical
    alertForDuration: 5m
    namespace: monitoring
  velero:
    enabled: true
    labels: {}
    severity: critical
    alertForDuration: 5m
    namespace: monitoring

# ServiceMonitor for Prometheus metrics scraping
serviceMonitor:
  enabled: true
  interval: 30s
  labels: {}
