apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "obmondo-backup-exporter.fullname" . }}
  labels:
    {{- include "obmondo-backup-exporter.labels" . | nindent 4 }}
rules:
  # CNPG Cluster CRDs
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["scheduledbackups"]
    verbs: ["get", "list", "watch"]

  # CronJobs for logical backups
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]

  # Velero CRDs
  - apiGroups: ["velero.io"]
    resources: ["schedules"]
    verbs: ["get", "list", "watch"]

  # BarmanCloud ObjectStores for WAL S3 config
  - apiGroups: ["barmancloud.cnpg.io"]
    resources: ["objectstores"]
    verbs: ["get", "list"]

  # Namespaces for cross-namespace discovery
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]

  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]