# GoAlert values (chart is flattened & maintained in-tree).
# General (non-secret) defaults live here in KubeAid; org-internal/secret values
# (DB URL, data-encryption key, ingress hosts) come from kubeaid-config-enableit.

## @section Image parameters
image:
  repository: goalert/goalert
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

## @section GoAlert parameters
## GoAlert reads its DB URL + data-encryption key from an existing Secret.
## Provide it (sealed) from kubeaid-config-enableit. See plan.md.
goalert:
  existingSecret:
    name: goalert
    keys:
      GOALERT_DB_URL: "GOALERT_DB_URL"
      GOALERT_DATA_ENCRYPTION_KEY: "GOALERT_DATA_ENCRYPTION_KEY"
  # Only used when existingSecret.name is empty (renders secrets as plaintext
  # env — avoid). Kept for template compatibility.
  environment:
    GOALERT_DB_URL: ""
    GOALERT_DATA_ENCRYPTION_KEY: ""

## @section PostgreSQL
## Bundled Bitnami PostgreSQL is removed. GoAlert connects to a CloudNativePG
## cluster (goalert-pgsql) provisioned by the kubeaid-addons chart, the same way
## the oncall chart does. GOALERT_DB_URL is built from that cluster's credentials
## and delivered via the existing Secret above.
postgresql:
  enabled: false

## @section Service Account parameters
serviceAccount:
  create: true
  annotations: {}
  name: ""

## @section Service parameters
service:
  type: ClusterIP
  port: 8081

## @section Ingress parameters
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

## @section Autoscaling parameters
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

## @section Pod Values
nodeSelector: {}
tolerations: []
affinity: {}
resources: {}
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
replicaCount: 1

## @section Database (CloudNativePG via the kubeaid-addons subchart)
## Provisions a CNPG Cluster `goalert-pgsql` (service `goalert-pgsql-rw`,
## CNPG-generated secret `goalert-pgsql-app`, database/owner `goalert`), the same
## way the oncall chart does. Cluster-specific bits (backups/S3, sizing, env)
## are private — set them in kubeaid-config-enableit's goalert values.
global:
  postgresql:
    enabled: true
    instanceName: goalert
    database: goalert
    owner: goalert
    instances: 1
    size: 2Gi
    netpol: false
