# hostNetworkPolicy configures the CiliumClusterwideNetworkPolicy that locks
# down the host endpoint on every node. Enable on bare-metal clusters where
# the public NIC needs an ingress filter; leave disabled on cloud clusters that
# rely on cloud-provider security groups instead.
hostNetworkPolicy:
  enabled: false
  allowSshFrom: []          # CIDRs or bare IPs (treated as /32); empty = SSH open to world
  # publicPorts are the service ports allowed from the world (HTTP + HTTPS).
  publicPorts: [80, 443]
  # apiserverSourceCIDRs lists the CIDRs/IPs allowed to reach 6443/TCP.
  # Empty by default; when empty, no 6443 rule is emitted (policy blocks it).
  apiserverSourceCIDRs: []

# loadBalancerIPPool is a list of CIDRs rendered into a CiliumLoadBalancerIPPool
# so Cilium LB-IPAM hands them to type=LoadBalancer services. Use on bare-metal
# clusters that have no cloud LB. Empty list = no pool is created.
loadBalancerIPPool: []

cilium:
  operator:
    replicas: 1
    rollOutPods: true
    priorityClassName: "system-node-critical"
  kubeProxyReplacement: "true"
  # With kube-proxy replacement, full-coverage socket LB translates
  # ClusterIPs only at connect() time. Packets a pod FORWARDS (the
  # netbird-operator's NetworkRouter routing mesh traffic to a Service
  # VIP, or any router/VPN-gateway pod) never touch a socket, leave the
  # pod still addressed to the VIP, and blackhole on the node — SYNs
  # visible leaving eth0, no reply ever. Hostns-only scopes socket LB
  # to the host namespace so pod traffic, forwarded flows included,
  # gets per-packet service translation. The cost is the socket-LB
  # fast path for pod-originated connects; the win is that routing
  # pods work at all.
  socketLB:
    hostNamespaceOnly: true
  ipam:
    mode: "kubernetes"

  # VXLAN tunnel mode: pod-to-pod traffic is encapsulated over the node
  # network, so no pod routes are programmed in the underlying cloud network.
  routingMode: tunnel
  tunnelProtocol: vxlan

  rollOutCiliumPods: true
  priorityClassName: "system-node-critical"
  hubble:
    metrics:
      enabled:
        - dns:query;ignoreAAAA
        - drop
        - tcp
        - flow
        - icmp
        - http
    relay:
      enabled: true
      rollOutPods: true
    ui:
      enabled: true
      rollOutPods: true
