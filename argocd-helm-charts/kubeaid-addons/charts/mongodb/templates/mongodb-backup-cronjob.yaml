{{- /* Gated on logicalbackup.enabled alone so backups can target an EXISTING,
       externally-managed MongoDBCommunity without this chart provisioning one
       (global.mongodb.enabled stays false). */ -}}
{{- if (((.Values.global).mongodb).logicalbackup).enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" .Values.global.mongodb.instanceName }}
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  schedule: {{ .Values.global.mongodb.logicalbackup.schedule | default "45 03 * * *" | quote }}
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          {{- if .Values.global.mongodb.logicalbackup.annotations }}
          annotations:
            {{- toYaml .Values.global.mongodb.logicalbackup.annotations | nindent 12 }}
          {{- end }}
          labels:
            app: {{ printf "%s-backup" .Values.global.mongodb.instanceName }}
        spec:
          containers:
            - name: mongodb-backup
              image: ghcr.io/obmondo/mongodb-backup:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: MONGO_URI
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.global.mongodb.logicalbackup.secretName }}
                      key: MONGO_URI
                - name: MONGO_COMPLETE
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.global.mongodb.logicalbackup.secretName }}
                      key: MONGO_COMPLETE
                - name: BACKUP_PROVIDER
                  value: {{ .Values.global.mongodb.logicalbackup.provider | default "az" | quote }}
              {{- if eq .Values.global.mongodb.logicalbackup.provider "s3" }}
                - name: S3_BUCKET
                  value: {{ .Values.global.mongodb.logicalbackup.s3bucket | quote }}
                - name: S3_PATH
                  value: {{ .Values.global.mongodb.logicalbackup.s3backuppath | quote }}
              {{- if not .Values.global.mongodb.logicalbackup.useiamrole }}
                - name: BACKUP_S3_REGION
                  value: {{ .Values.global.mongodb.logicalbackup.s3region | default "us-east-1" | quote }}
                - name: AWS_DEFAULT_REGION
                  value: {{ .Values.global.mongodb.logicalbackup.s3region | default "us-east-1" | quote }}
                - name: AWS_REGION
                  value: {{ .Values.global.mongodb.logicalbackup.s3region | default "us-east-1" | quote }}
                - name: BACKUP_S3_ENDPOINT
                  value: {{ .Values.global.mongodb.logicalbackup.s3endpoint | quote }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.global.mongodb.logicalbackup.awsAccessKeyIdSecretName }}
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.global.mongodb.logicalbackup.secretName }}
                      key: AWS_SECRET_ACCESS_KEY
              {{- end }}
              {{- else if eq .Values.global.mongodb.logicalbackup.provider "az" }}
                - name: AZ_BACKUP_PATH
                  value: {{ .Values.global.mongodb.logicalbackup.azbackuppath | default "mongodb-backup/graylog-mongodb" | quote }}
                - name: AZURE_STORAGE_ACCOUNT_NAME
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.global.mongodb.logicalbackup.secretName }}
                      key: AZURE_STORAGE_ACCOUNT_NAME
                - name: AZURE_STORAGE_ACCOUNT_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.global.mongodb.logicalbackup.secretName }}
                      key: AZURE_STORAGE_ACCOUNT_KEY
                - name: AZURE_STORAGE_CONTAINER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.global.mongodb.logicalbackup.secretName }}
                      key: AZURE_STORAGE_CONTAINER
              {{- end }}
              {{- with (((.Values.global).mongodb).logicalbackup).extraEnv }}
                {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                limits:
                  cpu: 100m
                  memory: 256Mi
                requests:
                  cpu: 100m
                  memory: 256Mi
              securityContext:
                privileged: false
                readOnlyRootFilesystem: false
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          terminationGracePeriodSeconds: 300
{{- end }}
