{{- if and ((.Values.global).netpol).enabled ((.Values.global).postgresql).netpol }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Values.global.postgresql.instanceName | default "postgresql" }}-cnpg-networkpolicy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: cilium-networkpolicy

spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: {{ .Values.global.postgresql.instanceName | default "postgresql" }}-pgsql

# =========
# EGRESS
# =========

  egress:
    # kube-apiserver
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP

    {{- if .Values.global.postgresql.cnpg.enabled }}
    # CNPG operator communication (CRITICAL)
    - toEndpoints:
        - matchLabels:
            {{- range $key, $value := .Values.global.postgresql.cnpg.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
            - port: "443"
              protocol: TCP
    {{- end }}

    # postgres internal communication
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ .Values.global.postgresql.instanceName | default "postgresql" }}-pgsql
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
            - port: "8000"
              protocol: TCP

    {{- if and .Values.global.postgresql.enabled .Values.global.postgresql.backups.enabled }}
    # S3 via FQDN
    - toFQDNs:
        {{- if .Values.global.postgresql.backups.endpointURL }}
        - matchName: {{ .Values.global.postgresql.backups.endpointURL | trimPrefix "https://" | trimPrefix "http://" | quote }}
        {{- else }}
        - matchPattern: "*.amazonaws.com"
        - matchPattern: "*.s3.amazonaws.com"
        - matchPattern: "*.s3.*.amazonaws.com"
        {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- end }}

# ========
# INGRESS
# ========

  ingress:
    {{- if .Values.global.postgresql.clients }}
    # client apps
    {{- range .Values.global.postgresql.clients }}
    - fromEndpoints:
        - matchLabels:
            {{- range $key, $value := .labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    {{- end }}
    {{- end }}

    {{- if .Values.global.postgresql.cnpg.enabled }}
    # CNPG operator
    - fromEndpoints:
        - matchLabels:
            {{- range $key, $value := .Values.global.postgresql.cnpg.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}  
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
            - port: "8000"
              protocol: TCP
            - port: "9187"
              protocol: TCP
    {{- end }}

    # intra-cluster postgres
    - fromEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ .Values.global.postgresql.instanceName | default "postgresql" }}-pgsql
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
            - port: "8000"
              protocol: TCP

    {{- if (((.Values.global.postgresql).monitoring).prometheus).enabled }}
    # Prometheus scraping (cross-namespace from monitoring ns)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.global.postgresql.monitoring.prometheus.namespace | quote }}
            {{- range $key, $value := .Values.global.postgresql.monitoring.prometheus.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "9187"
              protocol: TCP
    {{- end }}

{{- end }}