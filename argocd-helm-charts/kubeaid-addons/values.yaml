---
# kubeaid-addons values.yaml
# All values default to disabled/empty. Override in your kubeaid-config-<id> private repo.
# See README.md for full usage documentation.

# default-deny
# Namespace-wide Cilium default-deny policy. Rendered ONLY by the standalone
# kubeaid-addons ArgoCD app — never when this chart is used as a subchart.
defaultDeny:
  # -- Enable default-deny rendering. Must be explicitly set to true.
  enabled: false

  # -- Map of namespaces to configure. Each entry renders one CiliumNetworkPolicy
  # named `default-deny` in that namespace.
  # A namespace with no excluded pods gets `endpointSelector: {}` (full deny for all pods).
  # Use `excludedPods` to carve out pods that need unrestricted network access.
  namespaces: {}

# global
# Shared values consumed by all templates and the network-policies subchart.
global:

  # netpol
  netpol:
    # -- Master switch. Set to true to enable any CiliumNetworkPolicy rendering.
    enabled: false

    # -- Helm release name used to build policy names and label selectors.
    # Should match the Helm release name used by the application chart.
    releaseName: ""

    # -- Traefik ingress controller selector. Used by components that expose an HTTP/HTTPS endpoint.
    traefik:
      # -- Namespace where Traefik pods run.
      namespace: traefik
      # -- Labels that uniquely identify Traefik pods (Cilium identity keys).
      labels:
        "k8s:app.kubernetes.io/name": traefik
        "k8s:app.kubernetes.io/instance": traefik

    # -- Prometheus pod selector (namespace + labels) for metrics scrape ingress to workloads.
    prometheus:
      namespace: monitoring
      labels:
        "k8s:app.kubernetes.io/name": prometheus

  # fqdns
  # External FQDNs used in egress rules. Set in your private values file.
  telegram:
    # -- FQDN for Telegram API egress
    url: ""

  keycloak:
    # -- FQDN for Keycloak egress
    url: ""

  grafana:
    # -- FQDN for grafana.com plugin download egress
    url: ""
    # -- Enable CiliumNetworkPolicy for Grafana
    netpol: false

  googleStorage:
    # -- FQDN for Google Cloud Storage egress
    url: ""

  # postgresql
  # Provisions a CloudNativePG Cluster resource.
  # Requires the cloudnative-pg operator to be installed in the cluster.
  postgresql:
    monitoring:
      enablePodMonitor: true
    # -- Provision a CNPG Cluster resource.
    enabled: false

    # -- Enable the PostgreSQL CiliumNetworkPolicy (requires global.netpol.enabled)
    netpol: false

    # -- Name of the CNPG Cluster resource
    instanceName: ""

    # -- Number of PostgreSQL instances in the cluster
    instance: 1

    # -- Primary database name created during initdb
    database: app

    # -- Database owner created during initdb
    owner: app

    # -- PVC size for each PostgreSQL instance
    size: 2Gi

    # -- StorageClass for PVCs. Omit to use the cluster default.
    # storageClass: ""

    # -- Resource requests and limits
    resources:
      requests:
        memory: 500Mi
        cpu: 100m
      limits:
        memory: 800Mi
        cpu: "2"

    # -- Set to true to bootstrap a cluster from an existing backup.
    # When enabled the cluster name gets a "-recover" suffix.
    recover:
      enabled: false

    # -- Backup configuration via Barman object store.
    backups:
      # -- Enable scheduled backups (daily at midnight, 30d retention).
      enabled: false
      # cloud: aws          # "aws" or "azure"
      # destinationPath: "" # e.g. s3://my-bucket/postgres
      # endpointURL: ""     # object store endpoint
      # secretName: ""      # Kubernetes Secret holding cloud credentials

    # -- Logical backup configuration that uses ghcr.io/obmondo/logical-backup.
    logicalbackup:
      enabled: false

    # -- Client applications allowed to connect on port 5432.
    # Each entry is a map of pod label selectors for the client pod.
    clients: []

    # -- CNPG operator pod selector for webhook traffic (port 8000).
    cnpg:
      namespace: cloudnative-pg

  # mongodb
  # Provisions a MongoDBCommunity resource.
  # Requires the MongoDB Community operator to be installed in the cluster.
  mongodb:
    # -- Provision a MongoDBCommunity resource.
    enabled: false

    # -- Enable the MongoDB CiliumNetworkPolicy (requires global.netpol.enabled)
    netpol: false

    # -- Name of the MongoDBCommunity resource / replica set.
    instanceName: ""

    # -- Name of the ServiceAccount/Role/RoleBinding used by the MongoDB pods.
    serviceAccountName: ""

    # -- Number of MongoDB replica set members.
    replicas: 2

    # -- MongoDB server version.
    version: "4.4.1"

    # -- Database created for the application user.
    database: app

    # -- Application user created by the operator.
    user: app-user

    # -- Secret containing the application user password.
    passwordSecretName: ""

    # -- Additional labels added to MongoDB pods. Built-in labels are also added.
    podLabels: {}

    # -- Additional database roles granted to the application user.
    # Each entry is { db: "<database>", name: "<role>" }.
    additionalRoles: []

    agent:
      # -- MongoDB operator agent log level.
      logLevel: INFO

    # -- Client applications allowed to connect on port 27017.
    # Each entry is { namespace: "<ns>" (optional), selectorLabels: { ... } }.
    clients: []

    # -- Optional MongoDB operator pod selector if you need explicit operator-to-db traffic.
    operator:
      selectorLabels: {}

  # rabbitmq
  # Provisions a RabbitmqCluster resource.
  # Requires the rabbitmq-cluster-operator to be installed in the cluster.
  rabbitmq:
    # -- Provision a RabbitmqCluster resource.
    enabled: false

    # -- Enable the RabbitMQ CiliumNetworkPolicy (requires global.netpol.enabled)
    netpol: false

    # -- Name of the RabbitmqCluster resource
    instanceName: ""

    # -- Number of RabbitMQ replicas (use odd numbers for quorum: 1, 3, 5)
    replicas: 1

    # -- Additional rabbitmq.conf key-value pairs
    additionalConfig: {}

    # -- Resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi

  # component netpols
  # Per-component CiliumNetworkPolicy flags. All require global.netpol.enabled: true.
  engine:
    # -- Enable CiliumNetworkPolicy for the oncall-engine component
    netpol: false

  celery:
    # -- Enable CiliumNetworkPolicy for the oncall-celery component
    netpol: false

  redis:
    # -- Enable CiliumNetworkPolicy for Redis
    netpol: false

  whoami:
    # -- Enable CiliumNetworkPolicy for whoami (allows ingress from Traefik on port 80)
    netpol: false

  # prometheusLinuxaid
  # CiliumNetworkPolicies for a single prometheus-linuxaid deployment.
  # Requires global.netpol.enabled: true.
  # Each ArgoCD app instance manages exactly one namespace — set namespace below.
  # Renders three policies: prometheus, grafana, alertmanager.
  prometheusLinuxaid:
    # -- Enable CiliumNetworkPolicies for the configured prometheus-linuxaid namespace.
    netpol: false

    alertmanager:
      # -- FQDN for the Obmondo alerting webhook (egress on port 443).
      webhookFQDN: ""  # e.g. alerts.obmondo.com

    prometheus:
      # -- Extra namespaces Prometheus should scrape beyond the hardcoded puppetserver namespace.
      # Each entry is either a plain string (namespace name) or a map with `namespace` and `ports`.
      additionalScrapeNamespaces: []
      # Example:
      #   - my-app-namespace
      #   - namespace: another-ns
      #     ports:
      #       - "8080"

  # argocd
  # Baseline CiliumNetworkPolicy for Argo CD (charts/network-policies/templates/networkpolicy-argocd.yaml).
  # Requires global.netpol.enabled: true. Uses global.netpol.traefik / global.netpol.prometheus like other netpols.
  argocd:
    # -- Enable Argo CD baseline CiliumNetworkPolicy
    netpol: false
    # -- Namespace where Argo CD runs (policy metadata.namespace and pod namespace in rules)
    namespace: argocd
    # -- Labels selecting Argo CD pods (endpointSelector and internal fromEndpoints/toEndpoints)
    endpointSelectorLabels:
      app.kubernetes.io/part-of: argocd
    # -- kubeaid-agent client ingress (namespace + labels; nested like other clients)
    kubeaidAgent:
      namespace: monitoring
      labels:
        "k8s:app.kubernetes.io/name": kubeaid-agent

    # -- Optional: allow Prometheus blackbox-exporter synthetic probes (HTTP/TCP to server, repo-server, redis).
    # Set enabled: true and labels to match your blackbox pod (kubectl get pod -n monitoring -l ... --show-labels).
    blackboxExporter:
      enabled: false
      namespace: monitoring
      labels:
        "k8s:app.kubernetes.io/name": blackbox-exporter

    # -- Git hosts allowed for Argo CD repo access over HTTPS/SSH (egress toFQDNs).
    gitFQDNs: []

  # relate
  # CiliumNetworkPolicy for the Relate application pod.
  # Requires global.netpol.enabled: true.
  relate:
    # -- Enable CiliumNetworkPolicy for the Relate app pod.
    netpol: false

    # -- Base set of external FQDNs allowed on port 443. Set defaults here in the chart values.
    egressFQDNs: []

    # -- Additional FQDNs appended to egressFQDNs at render time. Set environment-specific
    # hosts here in the private kubeaid-config values without repeating the defaults.
    extraEgressFQDNs: []

  graylog:
    # -- Enable CiliumNetworkPolicy for Graylog.
    netpol: false

  # blackbox
  blackbox:
    # -- Master switch. Set to true to render Probe resources.
    enabled: false

    # -- List of probe groups, one Probe resource per module.
    probes: []
    # - module: http_2xx
    #   urls:
    #     - https://myapp.example.com
    # - module: http_4xx
    #   urls:
    #     - https://auth.example.com

  # harbor
  harbor:
    # Enable Harbor network policies
    netpol: false

  # sonarqube
  sonarqube:
    # -- Enable SonarQube network policies
    netpol: false

  # tlsChains
  # Generic cert-manager TLS chains using a selfSigned CA.
  # Each entry creates: selfSigned Issuer + CA Certificate + CA-backed Issuer + leaf Certificate.
  # dnsNames is the service name — auto-generates 5 standard K8s DNS SANs.
  # namespace defaults to the Helm release namespace if omitted.
  # Requires cert-manager installed in the cluster.
  tlsChains: []
  # - name: opensearch              # base name for all resources
  #   dnsNames: opensearch-cluster-master  # auto-generates standard K8s DNS SANs
  #   caSecretName: ""              # optional — defaults to <name>-ca-tls
  #   leafSecretName: ""            # optional — defaults to <name>-tls
