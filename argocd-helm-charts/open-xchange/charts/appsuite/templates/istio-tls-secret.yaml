{{- if eq (include "appsuite.createTLSSecret" .) "true" -}}
{{- $cn := printf "%s.%s.svc.cluster.local" ( include "ox-common.names.fullname" . ) .Release.Namespace -}}
{{- $cert := genSelfSignedCert $cn nil ((include "appsuite.mergeListWithMap" (dict "list" .Values.istio.ingressGateway.hosts "map" .Values.istio.ingressGateway.overridableHosts) | fromYaml).Result ) 365 -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "appsuite.secretTLSName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "ox-common.labels.standard" . | nindent 4 }}
type: Opaque
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end -}}
