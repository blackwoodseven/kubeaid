      match:
        - uri:
            prefix: "/api/drive/client/windows/ox/install"
      rewrite:
        uri: "/"
      route:
        - destination:
            host: "{{ include "appsuite.fullnameFromComponent" (dict "Context" $ "Component" "drive-client-windows-ox") }}.{{ .Release.Namespace }}.svc.cluster.local"
            port:
              number: 80
      {{- if $services.headers }}
      headers:
        request:
          set:
            host: {{ $services.headers.request.set.host | quote }}
            x-host: {{ index $services.headers.request.set "x-host" | quote }}
      {{- end }}
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- end }}
    {{- if (get .Values "core-mw").enabled }}
    - name: "guard-api-route"
      match:
        - uri:
            prefix: "{{ $appRoot }}/api/oxguard"
      rewrite:
        uri: "/oxguard"
