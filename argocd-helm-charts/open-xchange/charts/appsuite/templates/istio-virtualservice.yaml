{{- $hosts := (include "appsuite.mergeListWithMap" (dict "list" $services.hosts "map" $services.overridableHosts) | fromYaml).Result -}}
{{- $routes := $services.routes }}
{{- $extraRoutes := $services.extraRoutes }}
{{- $extraRouteProperties := $services.extraRouteProperties }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ printf "%s-%s-%s" (include "ox-common.names.fullname" $) "virtualservice" "businessmobility" | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "ox-common.labels.standard" $ | nindent 4 }}
spec:
  hosts:
    {{- if not (empty $hosts) }}
    {{- range $hosts }}
    - {{ . | quote }}
    {{- end }}
    {{- else }}
    {{ fail (printf "No hosts defined for service businessmobility") }}
    {{- end }}
  gateways:
    - {{ include "appsuite.ingressGateway" $ }}
  http:
    {{- range $key, $val := $extraRoutes }}
    - name: {{ $val.name | quote }}
      match:
        {{- range $val.matchPrefix }}
        - uri:
            prefix: {{ . | quote }}
        {{- end }}
      {{- if $val.redirect }}
      redirect:
         uri: {{ $val.redirect }}
      {{- else }}
      {{- if $val.rewrite }}
      rewrite:
        uri: {{ $val.rewrite | quote }}
      {{- end }}
      route:
        - destination:
            host: {{ include "appsuite.destinationHostForRoute" (dict "Route" $val "Context" $) }}
            port:
              number: {{ default 80 $val.destinationPort }}
      {{- if $val.timeout }}
      timeout: {{ $val.timeout | quote }}
      {{- end }}
      {{- if $services.headers }}
      headers:
        request:
          set:
            host: {{ $services.headers.request.set.host | quote }}
            x-host: {{ index $services.headers.request.set "x-host" | quote }}
      {{- end }}
      {{- end }}
      {{- if $extraRouteProperties }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- end }}
    {{- if .Values.istio.segmentedRouting.enabled -}}
    {{ include "appsuite.segmentedRoutingRedirect" (dict "LocalSite" .Values.istio.segmentedRouting.localSite "Sites" .Values.istio.segmentedRouting.sites "Paths" .Values.istio.segmentedRouting.businessmobilityPaths "Context" . "AppRoot" $appRoot) | nindent 4 }}
    {{- end }}
    - name: "businessmobility-route"
      match:
        - uri:
            prefix: "/usm-json"
        - uri:
            prefix: "/Microsoft-Server-ActiveSync"
      route:
        - destination:
            host: "{{ include "appsuite.fullnameFromComponent" (dict "Context" $ "Component" "core-mw") }}-businessmobility.{{ .Release.Namespace }}.svc.cluster.local"
            port:
              number: {{ default 80 (index .Values "core-mw" "istio" "virtualServices" "destinationPort" ) }}
      timeout: 1900s # needed for long polling. Similar to former Apache routing:
                     # BalancerMember http://localhost_sync:8009 timeout=1900 smax=0 ttl=60 retry=60 loadfactor=50 route=APP1
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
{{- end }}
{{- end -}}