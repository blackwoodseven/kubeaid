            host: {{ $services.headers.request.set.host | quote }}
            x-host: {{ index $services.headers.request.set "x-host" | quote }}
      {{- end }}
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- end }}
    {{- if (get .Values "core-mw").enabled }}
    - name: "guard-support-api-route"
      match:
        - uri:
            prefix: "{{ $appRoot }}/api/guardsupport"
      rewrite:
        uri: "/guardsupport"
      route:
        - destination:
            host: "{{ include "appsuite.fullnameFromComponent" (dict "Context" $ "Component" "core-mw") }}-http-api.{{ .Release.Namespace }}.svc.cluster.local"
            port:
