{{- if and .Values.istio.virtualServices.dav.enabled (get .Values "core-mw").enabled }}
---
{{- $services := .Values.istio.virtualServices.dav }}
{{- $hosts := (include "appsuite.mergeListWithMap" (dict "list" $services.hosts "map" $services.overridableHosts) | fromYaml).Result -}}
{{- $routes := $services.routes }}
{{- $extraRoutes := $services.extraRoutes }}
{{- $extraRouteProperties := $services.extraRouteProperties }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ printf "%s-%s-%s" (include "ox-common.names.fullname" $) "virtualservice" "dav" | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "ox-common.labels.standard" $ | nindent 4 }}
spec:
  hosts:
    {{- if not (empty $hosts) }}
    {{- range $hosts }}
    - {{ . | quote }}
    {{- end }}
    {{- else }}
    {{ fail (printf "No hosts defined for service dav") }}
    {{- end }}
  gateways:
    - {{ include "appsuite.ingressGateway" $ }}
  http:
    {{- if .Values.istio.segmentedRouting.enabled -}}
    {{ include "appsuite.segmentedRoutingRedirect" (dict "LocalSite" .Values.istio.segmentedRouting.localSite "Sites" .Values.istio.segmentedRouting.sites "Paths" .Values.istio.segmentedRouting.davPaths "Context" . "AppRoot" $appRoot) | nindent 4 }}
    {{- end }}
    {{- if not (empty $routes) }}
    {{- range $key, $val := $routes }}
    - name: {{ $val.name | quote }}
      match:
        {{- range $val.matchPrefix }}
        - uri:
            prefix: {{ . | quote }}
        {{- end }}
      {{- if $val.redirect }}
      redirect:
         uri: {{ $val.redirect }}
      {{- else }}
      {{- if $val.rewrite }}
      rewrite:
        uri: {{ $val.rewrite | quote }}
      {{- end }}
      route:
        - destination:
            host: {{ include "appsuite.destinationHostForRoute" (dict "Route" $val "Context" $) }}
            port:
              number: {{ default 80 $val.destinationPort }}
      {{- if $val.timeout }}
      timeout: {{ $val.timeout | quote }}
      {{- end }}
      {{- if $services.headers }}
      headers:
        request:
          set:
            host: {{ $services.headers.request.set.host | quote }}
            x-host: {{ index $services.headers.request.set "x-host" | quote }}
      {{- end }}
      {{- end }}
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- end }}
    {{- else }}
    {{- range $key, $val := $extraRoutes }}
    - name: {{ $val.name | quote }}
      match:
        {{- range $val.matchPrefix }}
        - uri:
            prefix: {{ . | quote }}
        {{- end }}
      {{- if $val.redirect }}
      redirect:
         uri: {{ $val.redirect }}
      {{- else }}
      {{- if $val.rewrite }}
      rewrite:
        uri: {{ $val.rewrite | quote }}
      {{- end }}
      route:
        - destination:
            host: {{ include "appsuite.destinationHostForRoute" (dict "Route" $val "Context" $) }}
            port:
              number: {{ default 80 $val.destinationPort }}
      {{- if $val.timeout }}
      timeout: {{ $val.timeout | quote }}
      {{- end }}
      {{- if $services.headers }}
      headers:
        request:
          set:
            host: {{ $services.headers.request.set.host | quote }}
            x-host: {{ index $services.headers.request.set "x-host" | quote }}
      {{- end }}
      {{- end }}
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- end }}
    - name: "caldav-well-known-redirect"
      match:
        - uri:
            prefix: "/.well-known/caldav"
      redirect:
         uri: /caldav/
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    - name: "carddav-well-known-redirect"
      match:
        - uri:
            prefix: "/.well-known/carddav"
      redirect:
         uri: /carddav/
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- if (get .Values "core-mw").enabled }}
    - name: "dav-infostore-route"
      match:
        - uri:
            prefix: "/servlet/webdav.infostore/"
      route:
        - destination:
            host: "{{ include "appsuite.fullnameFromComponent" (dict "Context" $ "Component" "core-mw") }}-sync.{{ .Release.Namespace }}.svc.cluster.local"
            port:
              number: {{ default 80 (index .Values "core-mw" "istio" "virtualServices" "destinationPort" ) }}
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    - name: "dav-root-route"
      match:
        - uri:
            prefix: "/"
      rewrite:
        uri: "/servlet/dav/"
      route:
        - destination:
            host: "{{ include "appsuite.fullnameFromComponent" (dict "Context" $ "Component" "core-mw") }}-sync.{{ .Release.Namespace }}.svc.cluster.local"
            port:
              number: {{ default 80 (index .Values "core-mw" "istio" "virtualServices" "destinationPort" ) }}
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end -}}
{{- if and .Values.istio.virtualServices.businessmobility.enabled (get .Values "core-mw").enabled }}
---
