{{- if ((.Values).istio).enabled -}}
{{- $appRoot := include "ox-common.appsuite.appRoot" . -}}
{{- $services := .Values.istio.virtualServices.appsuite -}}
{{- $hosts := (include "appsuite.mergeListWithMap" (dict "list" $services.hosts "map" $services.overridableHosts) | fromYaml).Result -}}
{{- $routes := $services.routes -}}
{{- $extraRoutes := $services.extraRoutes }}
{{- $extraRouteProperties := $services.extraRouteProperties }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ printf "%s-%s-%s" (include "ox-common.names.fullname" $) "virtualservice" "appsuite" | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "ox-common.labels.standard" $ | nindent 4 }}
spec:
  hosts:
    {{- if not (empty $hosts) }}
    {{- range $hosts }}
    - {{ . | quote }}
    {{- end }}
    {{- else }}
    {{ fail (printf "No hosts defined for service appsuite") }}
    {{- end }}
  gateways:
    - {{ include "appsuite.ingressGateway" $ }}
  http:
    {{- if not (empty $routes) }}
    {{- range $key, $val := $routes }}
    - name: {{ $val.name | quote }}
      match:
        {{- range $val.matchPrefix }}
        - uri:
            prefix: {{ . | quote }}
        {{- end }}
      {{- if $val.redirect }}
      redirect:
         uri: {{ $val.redirect }}
      {{- else }}
      {{- if $val.rewrite }}
      rewrite:
        uri: {{ $val.rewrite | quote }}
      {{- end }}
      route:
        - destination:
            host: {{ include "appsuite.destinationHostForRoute" (dict "Route" $val "Context" $) }}
            port:
              number: {{ default 80 $val.destinationPort }}
      {{- if $val.timeout }}
      timeout: {{ $val.timeout | quote }}
      {{- end }}
      {{- if $services.headers }}
      headers:
        request:
          set:
            host: {{ $services.headers.request.set.host | quote }}
            x-host: {{ index $services.headers.request.set "x-host" | quote }}
      {{- end }}
      {{- end }}
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- end }}
    {{- else }}
    {{- if (ne $appRoot "") }}
    - name: rootredirect
      match:
      - uri:
          exact: /
      redirect:
        uri: {{ $appRoot }}/
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    - name: trailslash
      match:
      - uri:
          exact: {{ $appRoot }}
      redirect:
        uri: {{ $appRoot }}/
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- end }}
    {{- range $key, $val := $extraRoutes }}
    - name: {{ $val.name | quote }}
      match:
        {{- range $val.matchExact }}
        - uri:
            exact: {{ . | quote }}
        {{- end }}
        {{- range $val.matchPrefix }}
        - uri:
            prefix: {{ . | quote }}
        {{- end }}
        {{- range $val.matchRegex }}
        - uri:
            regex: {{ $val.matchRegex | quote }}
        {{- end }}
      {{- if $val.redirect }}
      redirect:
        uri: {{ $val.redirect }}
      {{- else }}
      {{- if $val.rewrite }}
      rewrite:
        uri: {{ $val.rewrite | quote }}
        {{- if $val.rewriteAuthority }}
        authority: {{ $val.rewriteAuthority | quote }}
        {{- end }}
      {{- else }}
      {{- if $val.rewriteMatchRegex }}
      rewrite:
        uriRegexRewrite:
          match: {{ $val.rewriteMatchRegex | quote }}
          rewrite: {{ $val.rewriteRegex | quote }}
      {{- end }}
      {{- end }}
      route:
        - destination:
            host: {{ include "appsuite.destinationHostForRoute" (dict "Route" $val "Context" $) }}
            port:
              number: {{ default 80 $val.destinationPort }}
      {{- if $val.timeout }}
      timeout: {{ $val.timeout | quote }}
      {{- end }}
      {{- if $services.headers }}
      headers:
        request:
          set:
            host: {{ $services.headers.request.set.host | quote }}
            x-host: {{ index $services.headers.request.set "x-host" | quote }}
      {{- end }}
      {{- end }}
      {{- if not (empty $extraRouteProperties) }}
      {{- $extraRouteProperties | toYaml | nindent 6 }}
      {{- end }}
    {{- end }}
    {{- if .Values.istio.segmentedRouting.enabled -}}
    {{ include "appsuite.segmentedRoutingRedirect" (dict "LocalSite" .Values.istio.segmentedRouting.localSite "Sites" .Values.istio.segmentedRouting.sites "Paths" .Values.istio.segmentedRouting.appsuitePaths "Context" . "AppRoot" $appRoot) | nindent 4 }}
    {{- end }}
    {{- if and (get .Values "drive-client-windows-ox") (get .Values "drive-client-windows-ox").enabled }}
