{{- if and .Values.jwks.enabled (not .Values.jwks.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "core-ui.jwksSecret" . }}
type: kubernetes.io/tls
stringData:
  tls.crt: |
{{ required "jwks.publicKey must be set when jwks.existingSecret is empty" .Values.jwks.publicKey | indent 4 }}
  tls.key: |
{{ required "jwks.privateKey must be set when jwks.existingSecret is empty" .Values.jwks.privateKey | indent 4 }}
{{- end -}}
