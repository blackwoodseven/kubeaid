{{- $redisHosts := include "ox-common.redis.hosts" (dict "redis" .Values.redis "context" .) -}}
{{- if empty $redisHosts -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "core-mw.redis" . }}
  labels:
{{ include "ox-common.labels.standard" . | indent 4 }}
spec:
  ports:
    - port: 6379
  selector:
{{ include "ox-common.labels.matchLabels" . | indent 4 }}
    component: redis
{{- end -}}
