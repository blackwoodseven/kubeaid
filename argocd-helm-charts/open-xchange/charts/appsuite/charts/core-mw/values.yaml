#        bar: "true"
#

hooks:
  start: {}
  #    welcome_to_the_machine.sh: |
  #      #! /bin/bash
  #      echo "WELCOME TO THE MACHINE"
  beforeApply: {}
  beforeAppsuiteStart: {}

# -- Container ports
containerPorts:
  - containerPort: 8009
    name: http
#  - containerPort: 8010
#    name: https

initContainer: {}
  # resources:
  #   requests:
  #     cpu: "100m"
  #     memory: "1024Mi"
  #   limits:
  #     memory: "4096Mi"

# -- Pod Disruption Budget configuration
pdb:
  # -- Whether a PodDisruptionBudget should be created
  create: false
  # -- Minimum number or percentage of pods that must be available. Mutually exclusive with maxUnavailable. Examples: 1, "50%"
  minAvailable: ""
  # -- Maximum number or percentage of pods that can be unavailable. Mutually exclusive with minAvailable. Examples: 1, "25%"
  maxUnavailable: ""

# -- Number of nodes
replicas: 1
defaultScaling:
  nodes:
    default:
      roles:
        - http-api
        - sync
        - admin
        - businessmobility
        - request-analyzer
        - documents
#scaling:
#  nodes:
#    http-api:
#      replicas: 4
#      roles:
#        - http-api
#        - documents
#    sync:
#      replicas: 2
#      roles:
#        - sync
#    admin:
#      replicas: 1
#      roles:
#        - admin
#    businessmobility:
#      replicas: 1
#      roles:
#        - businessmobility
# -- List of extra sidecar containers
extraContainers: []

# -- List of extra volumes
extraVolumes: []

# -- List of extra mounts
extraMounts: []

# -- List of extra environment variables
extraEnv: []

# -- List of extra StatefulSet properties
extraStatefulSetProperties: {}

# -- Tolerations for pod assignment
nodeSelector: {}

# -- Tolerations for pod assignment
tolerations: []

# -- Affinity for pod assignment
affinity: {}

# -- Extra PodSpec definitions
extraPodSpec: {}

roles:
  http-api:
    services:
      - type: ClusterIP
        ports:
          - port: 80
            targetPort: http
            protocol: TCP
            name: http
  sync:
    services:
      - type: ClusterIP
        ports:
          - port: 80
            targetPort: http
            protocol: TCP
            name: http
  admin:
    services:
      - type: ClusterIP
        ports:
          - port: 80
            targetPort: http
            protocol: TCP
            name: http
  documents:
    controller: "StatefulSet"
    statefulSetServiceName: "hazelcast-headless"
    services:
      - name: hazelcast-headless
        headless: true
        ports:
          - name: tcp-hazelcast
            port: 5701
    values:
      features:
        status:
          documents: enabled
  businessmobility:
    services:
      - type: ClusterIP
        ports:
          - port: 80
            targetPort: http
            protocol: TCP
            name: http
    values:
      features:
        status:
          usm-eas: enabled
      properties:
        com.openexchange.usm.ox.url: http://localhost:8009/appsuite/api/
  request-analyzer:
    services:
      - type: ClusterIP
        ports:
          - port: 80
            targetPort: http
            protocol: TCP
            name: http

extras:
  monitoring:
    # -- Whether monitoring resources should be created, e.g. a `ConfigMap` containing the Grafana dashboards.
    enabled: false

# -- Whether to create a shared secret containing common properties as environment variables (e.g. SESSIOND_ENCRYPTION_KEY)
createCommonEnv: true

# -- Name of an existing secret with environment variable that will be added to the container. Those env variable take precedence over the common and secret env vars, but not over extraEnv.
existingEnvSecret: ""
#
#  apiVersion: v1
#  kind: Secret
#  stringData:
#    EXAMPLE: "true"
#

## -- Configuration for DocumentConverter client
documentConverterClient:
  cache:
    remoteCache: {}
      # url: https://optional-cache-host:8001/cache or blank to disable usage of CacheService in case core-cacheservice.enabled=true

## Gotenberg sub-chart configurable values
## Please see https://github.com/MaikuMori/helm-charts/blob/master/charts/gotenberg/values.yaml
gotenberg:
  # -- Whether `Gotenberg` should be enabled or not.
  enabled: false
  image:
    repository: registry.open-xchange.com/appsuite-core-internal/3rdparty/gotenberg
    tag: '8.27.0'
  securityContext:
    readOnlyRootFilesystem: true
  volumes:
    - name: tmp-volume
      emptyDir:
        medium: Memory
        sizeLimit: 256Mi
  volumeMounts:
    - name: tmp-volume
      mountPath: /tmp
  chromium:
    disableJavaScript: true
  extraEnv:
    - name: XDG_DATA_HOME
      value: "/tmp/.data"
    - name: XDG_CONFIG_HOME
      value: "/tmp/.config"
    - name: XDG_CACHE_HOME
      value: "/tmp/.cache"

## Collabora sub-chart configurable values
## Please see https://github.com/CollaboraOnline/online/tree/master/kubernetes/helm/collabora-online
collabora-online:
  # -- Whether `Collabora` should be enabled or not.
  enabled: false
  image:
    repository: registry.open-xchange.com/appsuite-core-internal/3rdparty/collabora-online
    tag: "25.04.9.2.1"
