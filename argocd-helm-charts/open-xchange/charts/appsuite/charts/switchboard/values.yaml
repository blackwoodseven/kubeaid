# Default values for switchboard.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  extras:
    monitoring:
      enabled: false

extras:
  monitoring:
    enabled: false

replicaCount: 1

defaultRegistry: registry.open-xchange.com

bindAddr: "::"
containerPort: 8080

image:
  repository: appsuite-core-internal/switchboard
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations:
  logging.open-xchange.com/format: "appsuite-json"

podSecurityContext: {}

defaultPodSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

securityContext: {}

defaultSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

istio:
  enabled: false
  hostname: ""
  gateway: "istio-system/default-gateway"
  oauth: false
  oauthHostname: "oauth2-proxy.oauth2-proxy.svc.cluster.local"

resources:
  # We recommend to always specify resources after actually measuring the values under
  # production-like circumstances.
  limits:
    cpu: 1
    memory: 196Mi
  requests:
    cpu: 300m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

probe:
  liveness:
    enabled: true
    periodSeconds: 10
    failureThreshold: 15

  readiness:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 5
    failureThreshold: 2
    timeoutSeconds: 5

hostname: ""
origins: "*"
logLevel: "info"
logJson: false

appsuite:
  apiSecret: ""
  webhookSecret: ""
  signatureSecret: ""

redis:
  hosts: []
  prefix: "switchboard"
  mode: "standalone"
  sentinelMasterId: "mymaster"
  db: 0
  tls:
    enabled: false
    ca: ""
  auth:
    enabled: false
    username: "default"
    password: ""

overrides:
  appsuiteSecret: ""
  zoomSecret: ""
  jwtSecret: ""
  redisSecret: ""

appsuiteSecret:
  enabled: true
jwtSecret:
  enabled: false

# Proxy settings to be used for outgoing requests (e.g. web push)
httpProxy: ""

jwt:
  sharedSecret: ""
  tokenExpiration: "1h"
  serviceCapabilities: "ai,calendar,contacts,infostore,jitsi,openai,switchboard,webmail,zoom"
  algorithm: "RS256"

oidc:
  issuer: ""

jwks:
  enabled: false
  secretName: ""

mysql:
  enabled: false
  existingSecret: ""
  host: ""
  database: ""
  connections: 10
  auth:
    user: ""
    password: ""

cron:
  cleanupDb: "0 0 * * *"
  sidecarInjection:
    disabled: true

vapid:
  enabled: false
  existingSecret: ""
  publicKey: ""
  privateKey: ""
  subject: ""
