apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ox-common.names.fullname" . }}
  labels:
    {{- include "ox-common.labels.standard" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ox-common.labels.matchLabels" . | nindent 6 }}
  template:
    metadata:
      annotations: {{ toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "ox-common.labels.podLabels" . | nindent 8 }}
    spec: {{ include "ox-common.pods.podSpec" (dict "podRoot" .Values "global" $ "context" . ) | nindent 6 }}
      containers:
        - name: main
          securityContext: {{ toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "ox-common.images.image" (dict "imageRoot" .Values.image "global" $ "context" . ) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: COM_OPENEXCHANGE_SPELLCHECK_LOG_PATH
              {{- if .Values.logging.root.file }}
              value: {{ printf "%s/%s" (.Values.logging.logDir | default "/var/log/open-xchange/spellcheck") (.Values.logging.logFile | default "spellcheck.log") | quote }}
              {{- else }}
              value: ""
              {{- end }}
            - name: COM_OPENEXCHANGE_SPELLCHECK_LOG_CONSOLE
              value: {{ .Values.logging.root.json | default "true" | quote }}
            - name: COM_OPENEXCHANGE_SPELLCHECK_LOG_LEVEL
              value: {{ .Values.logging.root.level | default "INFO" | upper | quote }}
            {{- if (eq ( include "ox-common.spellcheck.openssl.enabled" . ) "true") }}
            - name: COM_OPENEXCHANGE_SPELLCHECK_SSL_ENABLE
              value: "true"
            - name: COM_OPENEXCHANGE_SPELLCHECK_SSL_CERTFILE
              value: "/opt/open-xchange/spellcheck/etc/security/ssl-cert.pem"
            - name: COM_OPENEXCHANGE_SPELLCHECK_SSL_KEYFILE
              value: "/opt/open-xchange/spellcheck/etc/security/ssl-key.pem"
            - name: COM_OPENEXCHANGE_SPELLCHECK_SSL_KEYPASSWORD
              value: {{ include "ox-common.openssl.keyPassword" . | quote }}
            {{- end }}
            {{- if .Values.env }}
              {{- toYaml .Values.env | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
            - name: httpmetrics
              containerPort: 8002
              protocol: TCP
          {{- if .Values.probe.startup.enabled }}
          startupProbe:
            httpGet:
            {{- if (eq ( include "ox-common.spellcheck.openssl.enabled" . ) "true") }}
              path: /metrics
              port: httpmetrics
            {{- else }}
              path: /live
              port: http
            {{- end }}
            {{- omit .Values.probe.startup "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.liveness.enabled }}
          livenessProbe:
            httpGet:
            {{- if (eq ( include "ox-common.spellcheck.openssl.enabled" . ) "true") }}
              path: /metrics
              port: httpmetrics
            {{- else }}
              path: /live
              port: http
            {{- end }}
            {{- omit .Values.probe.liveness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.readiness.enabled }}
          readinessProbe:
            httpGet:
            {{- if (eq ( include "ox-common.spellcheck.openssl.enabled" . ) "true") }}
              path: /metrics
              port: httpmetrics
            {{- else }}
              path: /live
              port: http
            {{- end }}
            {{- omit .Values.probe.readiness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
          {{- if .Values.logging.root.file }}
            - name: spell-logs
              mountPath: {{ .Values.logging.logDir | default "/var/log/open-xchange/spellcheck" | quote }}
          {{- end }}
          {{- if (eq ( include "ox-common.spellcheck.openssl.enabled" . ) "true") }}
            - name: ssl-secrets
              mountPath: /opt/open-xchange/spellcheck/etc/security/
              readOnly: true
          {{- end }}
      volumes:
        {{- if .Values.logging.root.file }}
        - name: spell-logs
          emptyDir: {}
        {{- end }}
        {{- if (eq ( include "ox-common.spellcheck.openssl.enabled" . ) "true") }}
        - name: ssl-secrets
          secret:
            secretName: {{ include "ox-common.openssl.secretName" . }}
            items:
              - key: {{ include "ox-common.openssl.secret.certFileKey" . }}
                path: ssl-cert.pem
              - key: {{ include "ox-common.openssl.secret.keyFileKey" . }}
                path: ssl-key.pem
        {{- end }}
