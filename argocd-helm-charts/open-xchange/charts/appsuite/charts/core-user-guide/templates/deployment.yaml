apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ox-common.names.fullname" . }}
  labels:
    {{- include "ox-common.labels.standard" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ox-common.labels.matchLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if or .Values.nginx.mainConfig .Values.nginx.httpConfig }}
        checksum/nginx-config: {{ include (print $.Template.BasePath "/nginx-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ox-common.labels.matchLabels" . | nindent 8 }}
    spec: {{ include "ox-common.pods.podSpec" (dict "podRoot" .Values "global" $ "context" . ) | nindent 6 }}
      containers:
        - name: main
          {{- include "ox-common.containers.securityContext" (dict "podRoot" .Values "context" . "global" $) | nindent 10 }}
          image: {{ include "ox-common.images.image" (dict "imageRoot" .Values.image "global" $ "context" . ) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          {{- if .Values.probe.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.containerPort }}
            {{- omit .Values.probe.liveness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.readiness.enabled }}
          readinessProbe:
            httpGet:
                path: /
                port: {{ .Values.containerPort }}
            {{- omit .Values.probe.readiness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            {{- range $filename, $content := .Values.nginx.mainConfig }}
            - name: nginx-config
              mountPath: /etc/nginx/main.d/{{ $filename }}
              subPath: main.d-{{ $filename }}
            {{- end }}
            {{- range $filename, $content := .Values.nginx.httpConfig }}
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/{{ $filename }}
              subPath: conf.d-{{ $filename }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if or .Values.nginx.mainConfig .Values.nginx.httpConfig }}
        - name: nginx-config
          configMap:
            name: {{ include "ox-common.names.fullname" . }}-nginx-config
        {{- end }}

