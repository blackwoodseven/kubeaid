# Default values for core-user-guide.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

defaultRegistry: registry.open-xchange.com

image:
  repository: "core-user-guide"
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}

defaultPodSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

securityContext: {}

defaultSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

resources:
  # We recommend to always specify resources after actually measuring the values under
  # production-like circumstances.
  limits:
    cpu: 80m
    memory: 96Mi
  requests:
    cpu: 20m
    memory: 32Mi

nodeSelector: {}

tolerations: []

affinity: {}

probe:
  liveness:
    enabled: true
    periodSeconds: 10
    failureThreshold: 15

  readiness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 5
    failureThreshold: 2
    timeoutSeconds: 5

containerPort: 8080

# Nginx configuration overrides
# Files added here will be mounted into the nginx configuration directories
nginx:
  # Main context configuration (mounted to /etc/nginx/main.d/)
  # Use this for directives like worker_processes, error_log, etc.
  # Example:
  #   mainConfig:
  #     worker_processes.conf: |
  #       worker_processes 4;
  mainConfig: {}

  # HTTP context configuration (mounted to /etc/nginx/conf.d/)
  # Use this for server blocks, upstream definitions, etc.
  # Example:
  #   httpConfig:
  #     custom-headers.conf: |
  #       add_header X-Custom-Header "value";
  httpConfig: {}
