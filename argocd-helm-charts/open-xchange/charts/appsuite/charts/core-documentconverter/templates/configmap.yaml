apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "core-documentconverter.configmap" . }}
data:
{{ (tpl (.Files.Glob "config/logback.xml").AsConfig . ) | indent 2 }}
{{ (tpl (.Files.Glob "config/documentconverter.properties").AsConfig . ) | indent 2 }}
{{ (tpl (.Files.Glob "config/readerengine.blacklist").AsConfig . ) | indent 2 }}
{{ (tpl (.Files.Glob "config/readerengine.whitelist").AsConfig . ) | indent 2 }}
