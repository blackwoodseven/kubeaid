# Default values for core-imageconverter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  extras:
    monitoring:
      enabled: false

replicaCount: 1

defaultRegistry: registry.open-xchange.com

image:
  repository: "core-cacheservice"
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations:
  logging.open-xchange.com/format: "appsuite-json"

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8001

resources:
  requests:
    cpu: 250m
    memory: 750Mi
  limits:
    cpu: 4000m
    memory: 2000Mi

nodeSelector: {}

tolerations: []

affinity: {}

probe:
  liveness:
    enabled: true
    periodSeconds: 10
    failureThreshold: 15

  readiness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 5
    failureThreshold: 2
    timeoutSeconds: 5

  startup:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30

# existingPropertiesSecret: ""

# basicAuthLogin: ""
# basicAuthPassword: ""

remoteDebug:
  enabled: false
  # port: 8101

cacheService:
  mysql:
    host: ""
    port: 3306
    database: "cacheservicedb"
    auth:
      user: ""
      password: ""
      rootPassword: ""
    connectionPool: {}
      # connectTimeoutMilliseconds: 2000
      # maxLifetimeMilliseconds: 600000
      # idleTimeoutMilliseconds: 300000
      # maxPoolSize: 10
      # minPoolIdleSize: 5
    keystore: {}
      # If the keystore(base64 encoded) is set it can be used as follows: "clientCertificateKeyStoreUrl: file:/opt/open-xchange/etc/ox-sql-clientstore"
      # clientCertificateKeyStore:
      # If the keystore(base64 encoded) is set it can be used as follows: "trustCertificateKeyStoreUrl: file:/opt/open-xchange/etc/ox-sql-truststore"
      # trustCertificateKeyStore:
