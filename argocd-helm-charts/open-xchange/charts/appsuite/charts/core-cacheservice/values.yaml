      #   value: false
      # - name: enabledTLSProtocols
      #   value: TLSv1,TLSv1.1,TLSv1.2,TLSv1.3
      # - name: clientCertificateKeyStoreUrl
      #   value:
      # - name: clientCertificateKeyStorePassword
      #   value:
      # - name: clientCertificateKeyStoreType
      #   value:
      # - name: trustCertificateKeyStoreUrl
      #   value:
      # - name: trustCertificateKeyStorePassword
      #   value:
      # - name: trustCertificateKeyStoreType
      #   value:
  s3ObjectStores: []
    # - id: 1
    #   endpoint: ""
    #   region: "eu-central-1"
    #   bucketName: "cacheservice"
    #   accessKey: ""
    #   secretKey: ""
    #   trace: false
  sproxydObjectStores: []
    # - id: 1
    #   endpoint: ""
    #   path: "proxyd/cacheservice"
  fileStores: []
    # - id: 1
    #   path: "/var/spool/open-xchange/cacheservice"
  cacheDefaults: {}
    # maxEntries: 100000
    # maxSizeMegaBytes: -1
    # maxLifetimeSeconds: 2592000
    # cleanupPeriodSeconds: 300
    # minCleanupRuntimeSeconds: 0
  # jvmHeapSizeMB: 768

logging:
  debug: true
  logDir: /var/log/open-xchange/cacheservice
  logFile: cacheservice.log
  maxFileSize: 2MB
  maxTotalFileSize: 50GB
  maxIndex: 20
  queueSize: 2048
  root:
    level: INFO
    json: true
    syslog: false
    logstash: false
    file: false
  json:
    prettyPrint: false
  syslog:
    host: localhost
    port: 514
    facility: USER
  logstash:
    host: elk.open-xchange.com
    port: 31337
  logger:
    - name: org.apache.cxf
      level: WARN
    - name: com.openexchange.soap.cxf.logger
      level: WARN
    - name: com.openexchange.cacheservice
      level: INFO

persistence:
  enabled: false
  existingClaim: ""
  ## core-cacheservice data Persistent Volume Storage Class
  ## If defined, storageClass: <storageClassName>.
  ## If set to "-", storageClassName: "", which disables dynamic provisioning.
  ## If undefined or set to null, no storageClassName spec is
  ## set, choosing the default(gp2 on AWS, standard on GKE, AWS & OpenStack).
  ## accessMode can be overridden for entry fileItemStore.
  storageClass: null
  accessMode: ReadWriteOnce
  fileItemStore:
    ## if volumeName is set, use this existing PersistentVolume
    #volumeName:
    ## Provide proper class for existing volume
    #storageClass: "-"
    ## Provide matching accessMode for volume
    #accessMode: "ReadWriteMany"
    matchLabels: {}
    matchExpressions: []
    #hostPath: "/var/opt/cacheservice"
    path: "/var/spool/open-xchange/cacheservice"
    size: "10Gi"

extras:
  monitoring:
     # -- Whether monitoring resources should be created, e.g. a `ConfigMap` containing the Grafana dashboards.
    enabled: false

remoteDebug:
  enabled: false
  port:
