{{- if .Values.basicAuthLogin }}
com.openexchange.cacheservice.basicAuth.user={{ .Values.basicAuthLogin | toString }}
{{- end }}
{{- if .Values.basicAuthPassword }}
com.openexchange.cacheservice.basicAuth.password={{ .Values.basicAuthPassword | toString }}
{{- end }}

com.openexchange.cacheservice.database.host={{ (include "ox-common.mysql.host" (dict "mysql" .Values.cacheService.mysql "context" . "global" $)) }}
com.openexchange.cacheservice.database.port={{ (include "ox-common.mysql.port" (dict "mysql" .Values.cacheService.mysql "context" . "global" $)) }}
com.openexchange.cacheservice.database.schema={{ (include "ox-common.mysql.database" (dict "mysql" .Values.cacheService.mysql "context" . "global" $)) }}
com.openexchange.cacheservice.database.user={{ (include "ox-common.mysql.user" (dict "mysql" .Values.cacheService.mysql "context" . "global" $)) }}
com.openexchange.cacheservice.database.password={{ (include "ox-common.mysql.password" (dict "mysql" .Values.cacheService.mysql "context" . "global" $)) }}

{{- if not (empty .Values.cacheService.mysql.auth.rootPassword) }}
com.openexchange.cacheservice.database.rootPassword={{ .Values.cacheService.mysql.auth.rootPassword }}
{{- end }}

com.openexchange.cacheservice.database.connectionpool.connectTimeout={{ .Values.cacheService.mysql.connectionPool.connectTimeoutMilliseconds | default 2000 | int64 }}
com.openexchange.cacheservice.database.connectionpool.maxLifetime={{ .Values.cacheService.mysql.connectionPool.maxLifetimeMilliseconds | default 600000 | int64 }}
com.openexchange.cacheservice.database.connectionpool.idleTimeout={{ .Values.cacheService.mysql.connectionPool.idleTimeoutMilliseconds | default 300000 | int64 }}
com.openexchange.cacheservice.database.connectionpool.maxPoolSize={{ .Values.cacheService.mysql.connectionPool.maxPoolSize | default 10 | int }}
{{- if not (empty .Values.cacheService.mysql.connectionPool.minPoolIdleSize) }}
com.openexchange.cacheservice.database.connectionpool.minimumPoolIdle={{ .Values.cacheService.mysql.connectionPool.minPoolIdleSize | int }}
{{- end }}

{{- if .Values.cacheService.mysql }}
{{- if .Values.cacheService.mysql.properties }}
{{- $CURID := 50 }}
{{- range .Values.cacheService.mysql.properties }}
{{ printf "com.openexchange.cacheservice.database.property.%s" (toString $CURID) }}={{ .name }}={{ .value }}
{{- $CURID = add1 $CURID }}
{{- end }}
{{- end }}
{{- end }}
{{- $outerScope := . }}
{{- $dict := dict "1" "0" }}
{{- $fileDefault1Used := or .Values.persistence.enabled (not (or .Values.cacheService.s3ObjectStores .Values.cacheService.sproxydObjectStores .Values.cacheService.fileStores)) }}
{{- if $fileDefault1Used }}
{{ printf "com.openexchange.cacheservice.objectstore.file.1.path" }}={{ ternary .Values.persistence.fileItemStore.path "/var/spool/open-xchange/cacheservice" (and .Values.persistence.enabled (not (empty .Values.persistence.fileItemStore.path))) }}
{{- $_ := set $dict "1" "file:1," }}
{{- else }}
{{- $_ := unset $dict "1" }}
{{- end }}

{{- if .Values.cacheService.s3ObjectStores }}
{{- range .Values.cacheService.s3ObjectStores }}
{{- $CURIDSTR := toString .id }}
{{ printf "com.openexchange.cacheservice.objectstore.s3.%s.endpoint" $CURIDSTR }}={{ required "An S3 object store endpoint is required!" .endpoint }}
{{ printf "com.openexchange.cacheservice.objectstore.s3.%s.region" $CURIDSTR }}={{ .region | default "eu-central-1" }}
{{ printf "com.openexchange.cacheservice.objectstore.s3.%s.bucketName" $CURIDSTR }}={{ .bucketName | default "cacheservice" }}
{{ printf "com.openexchange.cacheservice.objectstore.s3.%s.accessKey" $CURIDSTR }}={{ required "An S3 object store accessKey is required!" .accessKey }}
{{ printf "com.openexchange.cacheservice.objectstore.s3.%s.secretKey" $CURIDSTR }}={{ required "An S3 object store secretKey is required!" .secretKey }}
{{ printf "com.openexchange.cacheservice.objectstore.s3.%s.trace" $CURIDSTR }}={{ toString (.trace | default false) }}
{{- with $outerScope }}
{{- $_ := set $dict (toString (add1 (len $dict))) (printf "s3:%s," $CURIDSTR) }}
{{- end }}
{{- end }}
{{- end }}

{{- if .Values.cacheService.sproxydObjectStores }}
{{- range .Values.cacheService.sproxydObjectStores }}
{{- $CURIDSTR := toString .id }}
{{ printf "com.openexchange.cacheservice.objectstore.sproxyd.%s.endpoint" $CURIDSTR }}={{ required "An sproxyd object store endpoint is required!" .endpoint }}
{{ printf "com.openexchange.cacheservice.objectstore.sproxyd.%s.path" $CURIDSTR }}={{ .path | default "proxyd/cacheservice" }}
{{- with $outerScope }}
{{- $_ := set $dict (toString (add1 (len $dict))) (printf "sproxyd:%s," $CURIDSTR) }}
{{- end }}
{{- end }}
{{- end }}

{{- if .Values.cacheService.fileStores }}
{{- range .Values.cacheService.fileStores }}
{{- $CURIDSTR := toString (add .id (ternary 1 0 $fileDefault1Used)) }}
{{ printf "com.openexchange.cacheservice.objectstore.file.%s.path" $CURIDSTR }}={{ .path | default "/var/spool/open-xchange/cacheservice" }}
{{- with $outerScope }}
{{- $_ := set $dict (toString (add1 (len $dict))) (printf "file:%s," $CURIDSTR) }}
{{- end }}
{{- end }}
{{- end }}

com.openexchange.cacheservice.objectStoreIds={{ (printf "%v" (values $dict)) | trimall "map[" | trimall "]" }}

{{- if and (eq ( include "ox-common.java.ssl.enabled" . ) "true") }}
com.openexchange.cacheservice.useSSL=true
com.openexchange.cacheservice.ssl.keyStorePath=/opt/open-xchange/cacheservice/etc/security/java-ssl.ks
com.openexchange.cacheservice.ssl.keyStorePassword={{ include "ox-common.java.ssl.keyStorePassword" . }}
{{- if and (eq ( include "ox-common.java.ssl.useTrustStore" . ) "true") }}
com.openexchange.cacheservice.ssl.trustStorePath=/opt/open-xchange/cacheservice/etc/security/java-ssl.ts
com.openexchange.cacheservice.ssl.trustStorePassword={{ include "ox-common.java.ssl.trustStorePassword" . }}
com.openexchange.cacheservice.ssl.verifyHostNames=false
{{- end }}
{{- end }}

{{- if .Values.cacheService.cacheDefaults }}
{{- $MAX_KEYCOUNT := (ternary 100000 .Values.cacheService.cacheDefaults.maxEntries (eq .Values.cacheService.cacheDefaults.maxEntries nil)) | int64 }}
com.openexchange.cacheservice.cacheDefaults.maxKeyCount={{ ternary -1 $MAX_KEYCOUNT (lt $MAX_KEYCOUNT 0) }}
{{- $MAX_SIZE_MB := (ternary -1 .Values.cacheService.cacheDefaults.maxSizeMegaBytes (eq .Values.cacheService.cacheDefaults.maxSizeMegaBytes nil)) | int64 }}
com.openexchange.cacheservice.cacheDefaults.maxSizeGB={{ ternary -1 (div $MAX_SIZE_MB 1024) (lt $MAX_SIZE_MB 0) }}
{{- $MAX_LIFETIME_SECONDS := (ternary 2592000 .Values.cacheService.cacheDefaults.maxLifetimeSeconds (eq .Values.cacheService.cacheDefaults.maxLifetimeSeconds nil)) | int64 }}
com.openexchange.cacheservice.cacheDefaults.keyTimeoutMinutes={{ ternary -1 (div $MAX_LIFETIME_SECONDS 60) (lt $MAX_LIFETIME_SECONDS 0) }}
{{- $CLEANUP_PERIOD_SECONDS := (ternary 300 .Values.cacheService.cacheDefaults.cleanupPeriodSeconds (eq .Values.cacheService.cacheDefaults.cleanupPeriodSeconds nil)) | int64 }}
com.openexchange.cacheservice.cacheDefaults.cleanupPeriodSeconds={{ ternary 0 $CLEANUP_PERIOD_SECONDS (lt $CLEANUP_PERIOD_SECONDS 0) }}
com.openexchange.cacheservice.cacheDefaults.minCleanupRuntimeSeconds={{ .Values.cacheService.cacheDefaults.minCleanupRuntimeSeconds | default 0 | int64 }}
{{- end }}
