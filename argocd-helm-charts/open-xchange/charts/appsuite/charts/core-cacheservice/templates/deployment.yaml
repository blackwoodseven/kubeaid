apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ox-common.names.fullname" . }}
  labels:
    {{- include "ox-common.labels.standard" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ox-common.labels.matchLabels" . | nindent 6 }}
  template:
    metadata:
      annotations: {{ toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "ox-common.labels.podLabels" . | nindent 8 }}
    spec: {{ include "ox-common.pods.podSpec" (dict "podRoot" .Values "global" $ "context" . ) | nindent 6 }}
      containers:
        - name: main
          securityContext: {{ toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "ox-common.images.image" (dict "imageRoot" .Values.image "global" $ "context" . ) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- if .Values.cacheService }}
            - name: CS_JVM_HEAP_SIZE_MB
              value: {{ .Values.cacheService.jvmHeapSizeMB | default "768" | quote }}
            {{- end }}
            - name: RELEASE_NAMESPACE
              value: {{ .Release.Name | quote }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                    fieldPath: status.podIP
            {{- if .Values.remoteDebug.enabled }}
            - name: JAVA_DEBUG_OPTIONS
              value: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:{{ .Values.remoteDebug.port | default 8101 }}"
            {{- end }}
            {{- if .Values.env }}
              {{- toYaml .Values.env | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
            - name: httplive
              containerPort: 8000
              protocol: TCP
            {{- if .Values.remoteDebug.enabled }}
            - name: debug
              containerPort: {{ .Values.remoteDebug.port | default 8101 }}
              protocol: TCP
            {{- end }}
          {{- if .Values.probe.startup.enabled }}
          startupProbe:
            httpGet:
              path: /health/liveness
              port: httplive
            {{- omit .Values.probe.startup "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: httplive
            {{- omit .Values.probe.liveness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: httplive
            {{- omit .Values.probe.readiness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.cacheService.mysql.keystore.clientCertificateKeyStore }}
            - name: db-clientstore
              mountPath: /opt/open-xchange/etc/ox-sql-clientstore
              subPath: ox-sql-clientstore
            {{- end }}
            {{- if .Values.cacheService.mysql.keystore.trustCertificateKeyStore }}
            - name: db-truststore
              mountPath: /opt/open-xchange/etc/ox-sql-truststore
              subPath: ox-sql-truststore
            {{- end }}
            - name: log-config
              mountPath: /opt/open-xchange/cacheservice/etc/logback.xml
              subPath: logback.xml
            - name: cacheservice-config
              mountPath: /opt/open-xchange/cacheservice/etc/cacheservice.properties
              subPath: cacheservice.properties
            {{- if .Values.existingPropertiesSecret }}
            - name: cacheservice-secrets-config
              mountPath: /opt/open-xchange/cacheservice/etc/secrets
              readOnly: true
            {{- end }}
            - name: cacheservice-logs
              mountPath: {{ .Values.logging.logDir }}
            - name: cacheservice-spool
              mountPath: /var/spool/open-xchange
          {{- if .Values.persistence.enabled }}
            - name: cacheservice-fileitem
              mountPath: {{ ternary .Values.persistence.fileItemStore.path "/var/spool/open-xchange/cacheservice" (and .Values.persistence.enabled (not (empty .Values.persistence.fileItemStore.path))) }}
          {{- end }}
          {{- if (eq ( include "ox-common.java.ssl.enabled" . ) "true") }}
            - name: java-ssl-secrets
              mountPath: /opt/open-xchange/cacheservice/etc/security/
              readOnly: true
          {{- end }}
      volumes:
        {{- if .Values.cacheService.mysql.keystore.clientCertificateKeyStore }}
        - name: db-clientstore
          configMap:
            name: {{ include "core-cacheservice.keystore" . }}
            items:
              - key: ox-sql-clientstore
                path: ox-sql-clientstore
        {{- end }}
        {{- if .Values.cacheService.mysql.keystore.trustCertificateKeyStore }}
        - name: db-truststore
          configMap:
            name: {{ include "core-cacheservice.keystore" . }}
            items:
              - key: ox-sql-truststore
                path: ox-sql-truststore
        {{- end }}
        - name: log-config
          configMap:
            name: {{ include "core-cacheservice.configmap" . }}
            items:
              - key: logback.xml
                path: logback.xml
        - name: cacheservice-config
          configMap:
            name: {{ include "core-cacheservice.configmap" . }}
            items:
              - key: cacheservice.properties
                path: cacheservice.properties
        {{- if .Values.existingPropertiesSecret }}
        - name: cacheservice-secrets-config
          secret:
            secretName: {{ .Values.existingPropertiesSecret }}
        {{- end }}
        - name: cacheservice-logs
          emptyDir: {}
        - name: cacheservice-spool
          emptyDir: {}
        {{- if (eq ( include "ox-common.java.ssl.enabled" . ) "true") }}
        - name: java-ssl-secrets
          secret:
            secretName: {{ include "ox-common.java.ssl.secretName" . }}
            items:
              - key: {{ include "ox-common.java.ssl.secret.keyStoreKey" . }}
                path: java-ssl.ks
              {{- if eq ( include "ox-common.java.ssl.useTrustStore" . ) "true" }}
              - key: {{ include "ox-common.java.ssl.secret.trustStoreKey" . }}
                path: java-ssl.ts
              {{- end }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: cacheservice-fileitem
        {{- if not (empty .Values.persistence.existingClaim) }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- else }}
          {{- if .Values.persistence.fileItemStore.hostPath }}
          hostPath:
            path: {{ .Values.persistence.fileItemStore.hostPath }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ template "core-cacheservice.fileItemStore" . }}
          {{- end }}
        {{- end }}
        {{- end }}
