# Default values for office-user-guide.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

defaultRegistry: registry.open-xchange.com

image:
  repository: "office-user-guide"
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart  appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    cpu: 80m
    memory: 96Mi

nodeSelector: {}

tolerations: []

affinity: {}

probe:
  liveness:
    enabled: true
    periodSeconds: 10
    failureThreshold: 15

  readiness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 5
    failureThreshold: 2
    timeoutSeconds: 5

# deployment port
containerPort: 8080
