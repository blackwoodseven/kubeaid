apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ox-common.names.fullname" . }}
  labels:
    {{- include "ox-common.labels.standard" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ox-common.labels.matchLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ox-common.labels.podLabels" . | nindent 8 }}
    spec: {{ include "ox-common.pods.podSpec" (dict "podRoot" .Values "global" $ "context" . ) | nindent 6 }}
      containers:
        - name: main
          securityContext: {{ toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "ox-common.images.image" (dict "imageRoot" .Values.image "global" $ "context" . ) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DCS_JVM_HEAP_SIZE_MB
              value: {{ .Values.extras.javaOpts.maxHeapSizeInMB | default 512 | quote }}
            - name: DCS_SERVICENAME
              value: {{ include "ox-common.dcs.serviceName" . | quote }}
            - name: DCS_SECURED_PROMETHEUS_ACCESS
              value: "false"
            - name: DCS_USESSL
              value: {{ include "ox-common.dcs.ssl.enabled" . | quote }}
            - name: DCS_DISCOVERYSTRATEGY
              value: "dns"
            {{- if .Values.logging.debug }}
            - name: LOGGING_LEVEL_ROOT
              value: "debug"
            {{- end }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                    fieldPath: status.podIP
            {{- if and (eq ( include "ox-common.dcs.ssl.enabled" . ) "true") (not (eq ( include "ox-common.dcs.ssl.useInternalCerts" . ) "true" )) }}
            - name: DCS_SSL_SERVER_KEYSTORE_PASSWORD
              {{- include "ox-common.java.ssl.secret.keyStorePassword.asValueFromSecretKeyRef" . | nindent 14 }}
            - name: DCS_SSL_CLIENT_KEYSTORE_PASSWORD
              {{- include "ox-common.java.ssl.secret.keyStorePassword.asValueFromSecretKeyRef" . | nindent 14 }}
              {{- if eq ( include "ox-common.java.ssl.useTrustStore" . ) "true" }}
            - name: DCS_SSL_SERVER_TRUSTSTORE_PASSWORD
              {{- include "ox-common.java.ssl.secret.trustStorePassword.asValueFromSecretKeyRef" . | nindent 14 }}
            - name: DCS_SSL_CLIENT_TRUSTSTORE_PASSWORD
              {{- include "ox-common.java.ssl.secret.trustStorePassword.asValueFromSecretKeyRef" . | nindent 14 }}
              {{- end }}
            {{- end }}
            {{- if .Values.env }}
              {{- toYaml .Values.env | nindent 12 }}
            {{- end }}
            {{- if .Values.remoteDebug.enabled }}
            - name: JAVA_TOOL_OPTIONS
              value: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address={{ .Values.remoteDebug.port }}"
            {{- end }}
          ports:
            - name: jms
              containerPort: 61616
              protocol: TCP
            - name: dcs-port
              containerPort: 8004
              protocol: TCP
            {{- if .Values.remoteDebug.enabled }}
            - name: httpdebug
              containerPort: {{ .Values.remoteDebug.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.probe.startup.enabled }}
          startupProbe:
            httpGet:
              path: /health/liveness
              port: dcs-port
            {{- omit .Values.probe.startup "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: dcs-port
            {{- omit .Values.probe.liveness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.readiness.enabled }}
          readinessProbe:
            httpGet:
                path: /health/readiness
                port: dcs-port
            {{- omit .Values.probe.readiness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: log-config
              mountPath: /etc/documents-collaboration/logback-spring.xml
              subPath: logback-spring.xml
            {{- if and (eq ( include "ox-common.dcs.ssl.enabled" . ) "true") (not (eq ( include "ox-common.dcs.ssl.useInternalCerts" . ) "true" )) }}
            - name: secrets
              mountPath: /etc/documents-collaboration/security
              readOnly: true
            {{- end }}
      volumes:
        - name: log-config
          configMap:
            name: {{ include "core-documents-collaboration.configmap" . }}
            items:
              - key: logback-spring.xml
                path: logback-spring.xml
        {{- if and (eq ( include "ox-common.dcs.ssl.enabled" . ) "true") (not (eq ( include "ox-common.dcs.ssl.useInternalCerts" . ) "true" )) }}
        - name: secrets
          secret:
            secretName: {{ include "ox-common.java.ssl.secretName" . }}
            items:
              - key: {{ include "ox-common.java.ssl.secret.keyStoreKey" . }}
                path: dcs-broker.ks
              - key: {{ include "ox-common.java.ssl.secret.keyStoreKey" . }}
                path: dcs-client.ks
              {{- if eq ( include "ox-common.java.ssl.useTrustStore" . ) "true" }}
              - key: {{ include "ox-common.java.ssl.secret.trustStoreKey" . }}
                path: dcs-broker.ts
              - key: {{ include "ox-common.java.ssl.secret.trustStoreKey" . }}
                path: dcs-client.ts
              {{- end }}
        {{- end }}
