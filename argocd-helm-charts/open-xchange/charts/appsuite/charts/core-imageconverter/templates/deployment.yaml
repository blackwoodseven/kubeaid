apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ox-common.names.fullname" . }}
  labels:
    {{- include "ox-common.labels.standard" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ox-common.labels.matchLabels" . | nindent 6 }}
  template:
    metadata:
      annotations: {{ toYaml .Values.podAnnotations | nindent 8 }}
        checksum/commonEnv: {{ include "ox-common.appsuite.commonEnv" . | sha256sum }}
      labels:
        {{- include "ox-common.labels.podLabels" . | nindent 8 }}
    spec: {{ include "ox-common.pods.podSpec" (dict "podRoot" .Values "global" $ "context" . ) | nindent 6 }}
      containers:
        - name: main
          securityContext: {{ toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "ox-common.images.image" (dict "imageRoot" .Values.image "global" $ "context" . ) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- if .Values.logging.root.json }}
            - name: CONSOLELOG
              value: "/dev/tty"
            {{- end }}
            {{- if .Values.imageconverter }}
            - name: IC_JVM_HEAP_SIZE_MB
              value: {{ .Values.imageconverter.jvmHeapSizeMB | default "1024" | quote }}
            {{- end }}
            - name: RELEASE_NAMESPACE
              value: {{ .Release.Name | quote }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                    fieldPath: status.podIP
            {{- if .Values.remoteDebug.enabled }}
            - name: JAVA_DEBUG_OPTIONS
              value: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:{{ .Values.remoteDebug.port | default 8105 }}"
            {{- end }}
            {{- if .Values.env }}
              {{- toYaml .Values.env | nindent 12 }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-common-env
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
            - name: http-live
              containerPort: 8018
              protocol: TCP
            {{- if .Values.remoteDebug.enabled }}
            - name: debug
              containerPort: {{ .Values.remoteDebug.port | default 8105 }}
              protocol: TCP
            {{- end }}
          {{- if .Values.probe.startup.enabled }}
          startupProbe:
            httpGet:
              path: /health/liveness
              port: http-live
            {{- omit .Values.probe.startup "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http-live
            {{- omit .Values.probe.liveness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /imageconverter
              port: http
            {{- omit .Values.probe.readiness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: log-config
              mountPath: /opt/open-xchange/imageconverter/etc/logback.xml
              subPath: logback.xml
            - name: ic-config
              mountPath: /opt/open-xchange/imageconverter/etc/imageconverter.properties
              subPath: imageconverter.properties
            - name: ic-logs
              mountPath: {{ .Values.logging.logDir }}
            - name: ic-spool
              mountPath: /var/spool/open-xchange
      volumes:
        - name: log-config
          configMap:
            name: {{ include "core-imageconverter.configmap" . }}
            items:
              - key: logback.xml
                path: logback.xml
        - name: ic-config
          configMap:
            name: {{ include "core-imageconverter.configmap" . }}
            items:
              - key: imageconverter.properties
                path: imageconverter.properties
        - name: ic-logs
          emptyDir: {}
        - name: ic-spool
          emptyDir: {}
