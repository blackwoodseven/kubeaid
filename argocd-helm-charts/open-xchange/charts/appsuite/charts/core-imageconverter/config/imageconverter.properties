{{- if .Values.imageconverter }}

{{- if .Values.imageconverter.targetFormats }}
{{- $TARGET_FORMATS := "" }}
{{ range .Values.imageconverter.targetFormats }}
{{- $TARGET_FORMATS = cat $TARGET_FORMATS (toString .) "," }}
{{- end }}
com.openexchange.imageconverter.targetFormats={{ trimSuffix "," (nospace $TARGET_FORMATS) }}
{{- end }}

{{- if .Values.imageconverter.preConvert }}
com.openexchange.imageconverter.preConvert.enabled={{ (.Values.imageconverter.preConvert.enabled | default false) | toString }}
{{- end }}

{{- $QUEUE_LENGTH := .Values.imageconverter.maxQueueLength | default 128 }}
com.openexchange.imageconverter.maxInstantQueueLength={{ $QUEUE_LENGTH }}
com.openexchange.imageconverter.maxBackgroundQueueLength={{ div (mul (.Values.imageconverter.maxAsyncQueueLengthPercentage | default 400) $QUEUE_LENGTH) 100 }}

{{- $MAX_PARALLEL_REQUESTS := .Values.imageconverter.maxParallelRequests | default 512 }}
com.openexchange.imageconverter.maxParallelRequests={{ $MAX_PARALLEL_REQUESTS }}
com.openexchange.imageconverter.convertTimeoutMillis={{ mul (.Values.imageconverter.processingTimeoutSeconds | default 10) 1000 }}

{{- if .Values.imageconverter.imageUserComment }}
com.openexchange.imageconverter.imagemagick.userComment={{ .Values.imageconverter.imageUserComment }}
{{- end }}

{{- if .Values.imageconverter.cache }}

{{- if or (and .Values.imageconverter.cache.remoteCache .Values.imageconverter.cache.remoteCache.url) (kindIs "string" .Values.imageconverter.cache.remoteCache.url) }}
com.openexchange.imageconverter.cache.remoteURL={{ toString (.Values.imageconverter.cache.remoteCache.url | default "") }}
{{- else if or (index .Values "core-cacheservice").enabled (index .Values.global "core-cacheservice").enabled }}
com.openexchange.imageconverter.cache.remoteURL={{ include "ox-common.cs.serverURL" . }}
{{- end }}

{{- $MAX_KEYCOUNT := (ternary 250000 .Values.imageconverter.cache.maxEntries (eq .Values.imageconverter.cache.maxEntries nil)) | int64 }}
com.openexchange.imageconverter.cache.maxKeyCount={{ ternary 250000 $MAX_KEYCOUNT (lt $MAX_KEYCOUNT 0) }}
{{- $MAX_SIZE_MB := (ternary -1 .Values.imageconverter.cache.maxSizeMegaBytes (eq .Values.imageconverter.cache.maxSizeMegaBytes nil)) | int64 }}
com.openexchange.imageconverter.cache.maxSizeMB={{ ternary -1 $MAX_SIZE_MB (lt $MAX_SIZE_MB 0) }}
{{- $MAX_LIFETIME_SECONDS := (ternary 2592000 .Values.imageconverter.cache.maxLifetimeSeconds (eq .Values.imageconverter.cache.maxLifetimeSeconds nil)) | int64 }}
com.openexchange.imageconverter.cache.keyTimeoutMinutes={{ ternary -1 (div $MAX_LIFETIME_SECONDS 60) (lt $MAX_LIFETIME_SECONDS 0) }}
{{- $CLEANUP_PERIOD_SECONDS := (ternary 300 .Values.imageconverter.cache.cleanupPeriodSeconds (eq .Values.imageconverter.cache.cleanupPeriodSeconds nil)) | int64 }}
com.openexchange.imageconverter.cache.cleanupPeriodSeconds={{ ternary 0 $CLEANUP_PERIOD_SECONDS (lt $CLEANUP_PERIOD_SECONDS 0) }}
{{- $MAX_LOCAL_KEYCOUNT := (ternary 1000 .Values.imageconverter.cache.maxLocalEntries (eq .Values.imageconverter.cache.maxLocalEntries nil)) | int64 }}
com.openexchange.imageconverter.cache.local.maxKeyCount={{ ternary 1000 $MAX_LOCAL_KEYCOUNT (lt $MAX_LOCAL_KEYCOUNT 0) }}
{{- $MAX_LOCAL_LIFETIME_SECONDS := (ternary 3600 .Values.imageconverter.cache.maxLocalLifetimeSeconds (eq .Values.imageconverter.cache.maxLocalLifetimeSeconds nil)) | int64 }}
com.openexchange.imageconverter.cache.local.keyTimeoutSeconds={{ ternary 3600 $MAX_LOCAL_LIFETIME_SECONDS (lt $MAX_LOCAL_LIFETIME_SECONDS 0) }}
{{- $LOCAL_CLEANUP_PERIOD_SECONDS := (ternary 60 .Values.imageconverter.cache.localCleanupPeriodSeconds (eq .Values.imageconverter.cache.localCleanupPeriodSeconds nil)) | int64 }}
com.openexchange.imageconverter.cache.local.cleanupPeriodSeconds={{ ternary 60 $LOCAL_CLEANUP_PERIOD_SECONDS (lt $LOCAL_CLEANUP_PERIOD_SECONDS 1) }}

{{- end }}

{{- end }}
