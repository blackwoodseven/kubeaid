groups:
  - name: zfs::pool::status
    rules:
    - alert: zfs::pool::status
      expr: node_zfs_zpool_state{state!="online"} > 0
      for: 30m
      labels:
        severity: critical
        alert_id: zfs::pool::status
      annotations:
        summary: 'ZFS Pool is Degraded.'
        description: 'The zfs pool **{{ .Labels.zpool }}** is {{ .Labels.state }} on {{ .Labels.instance }}'
  - name: monitor::system::zfs::replication
    rules:
    - alert: monitor::system::zfs::snapshot_missing_on_replica
      expr: |
        (
          zfs_dataset_creation_timestamp{replication_role="source", type="snapshot"}
          unless on(replication_pair, name, pool, type)
          zfs_dataset_creation_timestamp{replication_role="replica", type="snapshot"}
        )
        and on(certname) obmondo_monitoring{alert_id="monitor::system::zfs::snapshot_missing_on_replica"} > 0
      for: 30m
      labels:
        severity: critical
        alert_id: monitor::system::zfs::snapshot_missing_on_replica
      annotations:
        summary: 'ZFS snapshot is missing on replica for **{{ $labels.pool }}**'
        description: 'Snapshot **{{ $labels.name }}** from replication pair **{{ $labels.replication_pair }}** exists on source **{{ $labels.certname }}** but is missing on the replica.'
    - alert: monitor::system::zfs::replica_snapshot_stale
      expr: |
        (
          time()
          -
          max by(certname, pool, dataset) (
            label_replace(
              zfs_dataset_creation_timestamp{replication_role="replica", type="snapshot"},
              "dataset", "$1", "name", "(.+)@.*"
            )
          )
        ) > 7200
        and on(certname) obmondo_monitoring{alert_id="monitor::system::zfs::replica_snapshot_stale"} > 0
      for: 30m
      labels:
        severity: critical
        alert_id: monitor::system::zfs::replica_snapshot_stale
      annotations:
        summary: 'ZFS replica snapshots are stale for **{{ $labels.dataset }}**'
        description: 'The newest replicated snapshot for **{{ $labels.dataset }}** on **{{ $labels.certname }}** is older than 2 hours.'
