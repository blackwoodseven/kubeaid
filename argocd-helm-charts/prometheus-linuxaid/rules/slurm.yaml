groups:
  - name: monitor::system::slurm
    rules:
    - alert: monitor::system::slurm::job_failed
      expr: |
        slurm_jobs_failed > 0
        and on(certname) obmondo_monitoring{alert_id="monitor::system::slurm::job_failed"} > 0
      for: 10m
      labels:
        severity: warning
        alert_id: monitor::system::slurm::job_failed
      annotations:
        summary: "Slurm job failure detected"
        description: "One or more Slurm jobs have failed."

    - alert: monitor::system::slurm::nodes_down
      expr: |
        max by (certname, node) (slurm_node_status{status=~"down.*"}) == 1
        and on(certname) obmondo_monitoring{alert_id="monitor::system::slurm::nodes_down"} > 0
      for: 15m
      labels:
        severity: critical
        alert_id: monitor::system::slurm::nodes_down
      annotations:
        summary: "Slurm node **{{ .Labels.node }}** is DOWN"
        description: "Slurm node **{{ .Labels.node }}** is reported as DOWN for more than 15 minutes."

    - alert: monitor::system::slurm::jobs_pending
      expr: |
        slurm_jobs_pending > 0
        and on(certname) obmondo_monitoring{alert_id="monitor::system::slurm::jobs_pending"} > 0
      for: 1h
      labels:
        severity: warning
        alert_id: monitor::system::slurm::jobs_pending
      annotations:
        summary: "Slurm jobs pending for more than 1 hour"
        description: "One or more Slurm jobs have been in the PENDING state for more than **1 hour**."

    - alert: monitor::system::slurm::node_drain
      expr: |
        slurm_node_drain_reason_info == 1
        and on(certname, node) max by (certname, node) (slurm_node_status{status=~"drain.*"}) == 1
        and on(certname) obmondo_monitoring{alert_id="monitor::system::slurm::node_drain"} > 0
      for: 10m
      labels:
        severity: warning
        alert_id: monitor::system::slurm::node_drain
      annotations:
        summary: "Slurm node **{{ .Labels.node }}** in DRAIN state"
        description: "Slurm node **{{ .Labels.node }}** is in DRAIN state for more than 10 minutes. Reason: {{ .Labels.reason }} (since {{ .Labels.since }})."

    - alert: monitor::system::slurm::node_error
      expr: |
        max by (certname, node, status) (slurm_node_status{status=~"(err|fail|inval).*"}) == 1
        and on(certname) obmondo_monitoring{alert_id="monitor::system::slurm::node_error"} > 0
      for: 10m
      labels:
        severity: critical
        alert_id: monitor::system::slurm::node_error
      annotations:
        summary: "Slurm node **{{ .Labels.node }}** in ERROR/FAIL state"
        description: "Slurm node **{{ .Labels.node }}** is in **{{ .Labels.status }}** state for more than 10 minutes."

    - alert: monitor::system::slurm::version_mismatch
      expr: |
        (
          slurm_node_version_info
          unless on (cluster, version)
          (slurm_node_version_info and on (certname) slurm_info{type="general"})
        )
        and on (cluster) (slurm_node_version_info and on (certname) slurm_info{type="general"})
      for: 15m
      labels:
        severity: warning
        alert_id: monitor::system::slurm::version_mismatch
      annotations:
        summary: "Slurm node **{{ .Labels.certname }}** version mismatch in cluster **{{ .Labels.cluster }}**"
        description: "Slurm node **{{ .Labels.certname }}** is running version **{{ .Labels.version }}**, which differs from the controller in cluster **{{ .Labels.cluster }}**."
