tags:
  install-opensearch: false
  install-mongodb: false

# Graylog consumes a shared MongoDB provisioned by kubeaid-addons.
graylog:
  graylog:
    resources:
      limits:
      # NO memory or CPU limit - this peaks >4GB memory usage and CPU is based on processing needs. Memory usage really should be fixed - no upstream bug reported though.
      requests:
        cpu: "100m"
        memory: "1500Mi"
    podAnnotations:
      cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    #replicas: 1
    persistence:
      size: "50Gi"
      #storageClass: "gp2"
    plugins: {}
    journal:
      ## Sometime Graylog journal continually grow up or corrupt and cause Graylog unable to start.
      ## You need to clean up all journal files in order to run the Graylog.
      ## Change `graylog.journal.deleteBeforeStart` to `true` to delete all journal files before start
      ## Note: All uncommitted logs will be permanently DELETED when this value is true
      deleteBeforeStart: true
    options:
      allowHighlighting: true
      allowLeadingWildcardSearches: true

    mongodb:
      # This follows the pattern <cluster-db-user>
      uriSecretName: "mongodb-replica-set-graylog-graylog-user"
      uriSecretKey: "connectionString.standard"

    opensearch:
      # version: "7"
      uriSecretName: graylog-es-svc
      uriSecretKey: url
      uriSSL: false

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  # Disable Opensearch getting installed as a dependency of graylog chart
  opensearch:
    enabled: false

  # Disable MongoDB getting installed as a dependency of graylog chart
  mongodb:
    community:
      install: false
    # bitnami/mongodb tags older than ~6 months are removed from Docker Hub.
    # Use bitnamilegacy mirror which preserves old tags indefinitely.
    image:
      repository: bitnamilegacy/mongodb
      pullPolicy: IfNotPresent

global:
  netpol:
    enabled: false
    traefik:
      namespace: traefik
      labels: {}

  # tlsChains
  # Generic cert-manager TLS chains using a selfSigned CA.
  # Requires cert-manager installed in the cluster.
  tlsChains: []
  # - name: opensearch
  #   namespace: graylog
  #   serviceName: opensearch-cluster-master

  mongodb:
    enabled: true
    netpol: false
    instanceName: "mongodb-replica-set"
    serviceAccountName: "mongodb-database"
    replicas: 2
    version: "7.0.28"
    database: "graylog"
    user: "graylog-user"
    dataVolume:
      size: "10Gi"
    logsVolume:
      size: "2Gi"
    users:
      - db: graylog
        name: graylog-user
        passwordSecretRef:
          name: graylog-user-password
        roles:
          - db: graylog
            name: readWrite
        scramCredentialsSecretName: mongodb-replica-set
    resources:
      requests:
        cpu: "50m"
        memory: "1Gi"
      limits:
        memory: "2Gi"
    podLabels: {}
    # -- Client applications allowed to connect on port 27017.
    # Each entry has: selectorLabels (required). Clients must be in the same namespace.
    clients:
      - selectorLabels:
          app.kubernetes.io/name: graylog
          app.kubernetes.io/instance: graylog
    # -- Optional MongoDB operator pod selector.
    operator:
      selectorLabels: {}
    logicalbackup:
      enabled: false
      schedule: "45 03 * * *"
      secretName: mongodbbackup
      provider: az
      awsAccessKeyIdSecretName: awsaccesskeyid

  graylog:
    netpol: false
    replicas: 1
    inputPorts: []
    ingestors: []
    metrics:
      enabled: false
      namespace: monitoring
      labels: {}
    smtp:
      enabled: false
      fqdns: []
      port: 587

  opensearch:
    selectorLabels:
      app.kubernetes.io/name: opensearch
