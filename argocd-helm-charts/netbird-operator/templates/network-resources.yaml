{{- /* One NetworkResource per exposed Service. Each lives in its
     Service's namespace. With no `groups`, the resource joins the
     shared networkRouter.group. */}}
{{- range .Values.networkResources }}
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: {{ .name }}
  namespace: {{ .namespace | default $.Release.Namespace }}
spec:
  networkRouterRef:
    name: {{ $.Values.networkRouter.name }}
    namespace: {{ $.Release.Namespace }}
  serviceRef:
    name: {{ .service }}
  {{- if .groups }}
  groups:
    {{- range .groups }}
    - name: {{ . }}
    {{- end }}
  {{- else }}
  {{- /* No groups set: join the shared networkRouter.group. */}}
  groups:
    - name: {{ $.Values.networkRouter.group | default $.Values.networkRouter.name }}
  {{- end }}
{{- end }}
