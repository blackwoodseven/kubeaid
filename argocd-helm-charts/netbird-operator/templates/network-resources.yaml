{{- /* One NetworkResource per exposed Service. Each lives in its
     Service's namespace. With no `groups`, the resource joins the
     shared cluster group. */}}
{{- range .Values.networkResources }}
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: {{ .name }}
  namespace: {{ .namespace | default $.Release.Namespace }}
spec:
  networkRouterRef:
    name: {{ include "kubeaid.netbirdClusterName" $ }}
    namespace: {{ $.Release.Namespace }}
  serviceRef:
    name: {{ .service }}
  {{- if .groups }}
  groups:
    {{- range .groups }}
    - name: {{ . }}
    {{- end }}
  {{- else }}
  {{- /* No groups set: join the shared cluster group. */}}
  groups:
    - name: {{ include "kubeaid.netbirdClusterGroup" $ }}
  {{- end }}
{{- end }}
