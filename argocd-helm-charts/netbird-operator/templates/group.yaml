{{- /* Creates the shared NetBird group named by networkRouter.group.
     Every NetworkResource without its own groups joins it. Grant access
     by pointing a NetBird policy at this group. */}}
{{- if .Values.networkRouter.enabled }}
apiVersion: netbird.io/v1alpha1
kind: Group
metadata:
  name: {{ .Values.networkRouter.group | default .Values.networkRouter.name }}
  namespace: {{ .Release.Namespace }}
spec:
  name: {{ .Values.networkRouter.group | default .Values.networkRouter.name }}
{{- end }}
