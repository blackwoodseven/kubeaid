netbird-operator:
  # Pin the operator image to 0.7.0 — the ClusterProxy apiserver-proxy
  # controller lives there (the vendored 0.6.0 subchart/CRDs are otherwise fine).
  operator:
    image:
      tag: "v0.7.0"
  webhook:
    # The operator ships a mutating webhook on EVERY pod CREATE in the
    # cluster (mpod-v1.netbird.io) to inject mesh sidecars/DNS. On
    # kubeaid workload clusters the operator deploys un-wired (no
    # managementURL / API key until the post-bootstrap NetBird step),
    # so the webhook has nothing useful to do at first — yet the
    # subchart default failurePolicy=Fail meant a not-Ready operator
    # (e.g. its TLS cert not issued yet) blocked EVERY pod creation
    # cluster-wide: rook-ceph OSD provisioning, CSI, anything a
    # control-plane roll needed. A mesh-injection convenience must
    # degrade to "no injection", never veto unrelated workloads.
    failurePolicy: Ignore

    # Only namespaces that explicitly opt in are sent to the webhook
    # at all. Un-labelled namespaces never round-trip through it, so
    # an unhealthy operator can't even add latency to their pod
    # creation. Label a namespace to enable injection:
    #   kubectl label ns <ns> netbird.io/inject=true
    namespaceSelectors:
      - key: netbird.io/inject
        operator: In
        values: ["true"]

# New-gen NetBird Networks wiring (NetworkRouter + NetworkResource,
# netbird.io/v1alpha1) — the successor to the deprecated NBRoutingPeer.
# The router is the cluster's mesh routing peer; each entry in
# networkResources exposes one Kubernetes Service through it, published
# as a DNS record under the router's zone. Opt-in per cluster: enable
# and set the zone in the cluster's values overlay.
networkRouter:
  enabled: false
  name: cluster-router
  # Domain of an EXISTING NetBird DNS zone (create it in the Mgmt
  # dashboard first), e.g. "staging.mesh.acme.com". required-checked by the
  # template when enabled.
  dnsZone: ""
  # CRD default is 3 — heavy for small clusters; one routing peer is
  # plenty until HA routing is actually needed.
  replicas: 1

# Each entry: name (CR name), namespace (MUST be the Service's own
# namespace — serviceRef is name-only), service (the Service to
# expose), groups (NetBird groups the resource joins; Mgmt policies
# grant mesh access by targeting these).
networkResources: []
# - name: kube-api
#   namespace: default
#   service: kubernetes
#   groups: ["k8s-my-cluster"]

# NetBird API-server proxy (ClusterProxy + impersonation RBAC; requires
# netbird-operator >= 0.7.0). Runs a mesh peer that proxies kubectl to the
# IN-CLUSTER apiserver (kubernetes.default.svc) and stamps the caller's
# NetBird identity via impersonation — so each cluster is reachable at a
# unique proxy FQDN (clusterName.netbird-kubeapi-proxy.<domain>) instead of
# colliding on the shared kubernetes Service ClusterIP (10.96.0.1) across
# clusters. Reach it with: `netbird kubernetes write-kubeconfig <clusterName>`.
# NOTE: k8s RBAC must bind your NetBird users/groups to roles — the proxy
# impersonates, it does not itself grant any access.
clusterProxy:
  enabled: false
  # Unique per cluster — becomes the proxy's mesh DNS label and kube-context.
  # required-checked by the template when enabled.
  clusterName: ""
  # SA the proxy impersonates through; the chart also creates the matching
  # ClusterRole + ClusterRoleBinding granting it impersonate on users/groups.
  serviceAccountName: clusterproxy
  # In-cluster apiserver URL — the default sidesteps cert-SAN/hostname issues
  # since the proxy never leaves the cluster network to reach the apiserver.
  apiServer: https://kubernetes.default.svc.cluster.local
  # RBAC for the NetBird identities reached through the proxy. The proxy
  # impersonates the caller's NetBird user + groups but grants nothing itself —
  # each entry binds a subject to a ClusterRole so it actually gets access.
  #   group: <name>        bind a NetBird group (k8s Group)   } set exactly
  #   user:  <name>        bind one user (k8s User)           } one of these
  #   clusterRole: <name>  ClusterRole to grant (cluster-admin, admin, edit, view, …)
  #   namespaces: [ns…]    omit  -> cluster-wide ClusterRoleBinding
  #                        listed -> a namespaced RoleBinding in each namespace
  # Binding names are generated (netbird-<subject>-<role>). Empty list -> no
  # bindings. Verify the exact subject string with `kubectl auth whoami`.
  rbac: []
  # - group: Operations
  #   clusterRole: cluster-admin            # cluster-wide admin
  # - group: Developers
  #   clusterRole: edit
  #   namespaces: [team-a, team-b]          # edit in specific namespaces only
