                  value: false
                - key: "{{`{{ contains(element.image, 'registry.k8s.io/') }}`}}"
                  operator: Equals
                  value: true
            context:
              - name: k8sImage
                variable:
                  value: "{{`{{ replace_all(element.image, 'registry.k8s.io/', '') }}`}}"
            patchStrategicMerge:
