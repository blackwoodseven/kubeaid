                imagePullSecrets:
                  - name: {{ $k8sSecretName }}
          {{- end }}
          # Handle implicit org/user initContainers (e.g., graylog/graylog:6.3.1)
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ .Values.harborProxyCache.registry }}{{`') }}`}}"
