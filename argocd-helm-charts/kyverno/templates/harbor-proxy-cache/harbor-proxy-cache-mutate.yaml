{{- if (.Values.harborProxyCache).enabled }}

{{- $registry := .Values.harborProxyCache.registry | required "harborProxyCache.registry is required when enabled" }}
{{- $dockerHubProj := .Values.harborProxyCache.dockerHubProject | default (.Values.harborProxyCache.project | default "docker-hub-proxy-cache") }}
{{- $ghcrProj := .Values.harborProxyCache.ghcrProject | default "" }}
{{- $k8sProj := .Values.harborProxyCache.k8sProject | default "" }}
{{- $secretName := .Values.harborProxyCache.imagePullSecretName | default "harbor-proxy-cache" }}
{{- $ghcrSecretName := .Values.harborProxyCache.ghcrImagePullSecretName | default "harbor-ghcr-proxy-cache" }}
{{- $k8sSecretName := .Values.harborProxyCache.k8sImagePullSecretName | default "harbor-registry-k8s-proxy-cache" }}

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: harbor-proxy-cache-mutate
  annotations:
    policies.kyverno.io/title: "Redirect Docker Hub images to Harbor proxy cache"
    policies.kyverno.io/category: "Image Registry"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: "Pod,Deployment,StatefulSet,DaemonSet,Job,CronJob"
    policies.kyverno.io/description: >-
      Automatically redirects docker.io and registry-1.docker.io images to Harbor proxy cache
      to bypass Docker Hub rate limits. This policy mutates container images at admission time.
    kyverno.io/kubernetes-version: "1.27"
    policies.kyverno.io/minversion: 1.11.4
spec:
  admission: true
  background: true
  emitWarning: false
  failurePolicy: Ignore
  mutateExistingOnPolicyUpdate: {{ .Values.harborProxyCache.mutateExistingOnPolicyUpdate | default false }}
  rules:
    # Pod: only CREATE. K8s forbids changing imagePullSecrets on existing pods (UPDATE).
    - name: mutate-docker-io-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      {{- if .Values.harborProxyCache.excludeNamespaces }}
      exclude:
        any:
          - resources:
              namespaces:
                {{- range .Values.harborProxyCache.excludeNamespaces }}
                - {{ . | quote }}
                {{- end }}
      {{- end }}
      mutate:
        foreach:
          # Handle index.docker.io/ images
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ .Values.harborProxyCache.registry }}{{`') }}`}}"
                  operator: Equals
                  value: false
              any:
                - key: "{{`{{ contains(element.image, 'index.docker.io/') }}`}}"
                  operator: Equals
                  value: true
                - key: "{{`{{ contains(element.image, 'registry-1.docker.io/') }}`}}"
                  operator: Equals
                  value: true
            context:
              - name: resolvedImage
                variable:
                  value: "{{`{{ replace_all(replace_all(element.image, 'index.docker.io/', ''), 'registry-1.docker.io/', '') }}`}}"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{`{{ element.name }}`}}"
                    image: "{{ $registry }}/{{ $dockerHubProj }}/{{`{{ resolvedImage }}`}}"
                imagePullSecrets:
                  - name: {{ $secretName }}
          # Handle docker.io/ images (but not index.docker.io/)
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ .Values.harborProxyCache.registry }}{{`') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'index.docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'registry-1.docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'docker.io/') }}`}}"
                  operator: Equals
                  value: true
            context:
              - name: resolvedImage
                variable:
                  value: "{{`{{ replace_all(element.image, 'docker.io/', '') }}`}}"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{`{{ element.name }}`}}"
                    image: "{{ $registry }}/{{ $dockerHubProj }}/{{`{{ resolvedImage }}`}}"
                imagePullSecrets:
                  - name: {{ $secretName }}
          {{- if $ghcrProj }}
          # ghcr.io
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ $registry }}{{`') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'ghcr.io/') }}`}}"
                  operator: Equals
                  value: true
            context:
              - name: ghcrImage
                variable:
                  value: "{{`{{ replace_all(element.image, 'ghcr.io/', '') }}`}}"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{`{{ element.name }}`}}"
                    image: "{{ $registry }}/{{ $ghcrProj }}/{{`{{ ghcrImage }}`}}"
                imagePullSecrets:
                  - name: {{ $ghcrSecretName }}
          {{- end }}
          {{- if $k8sProj }}
          # registry.k8s.io
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ $registry }}{{`') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'registry.k8s.io/') }}`}}"
                  operator: Equals
                  value: true
            context:
              - name: k8sImage
                variable:
                  value: "{{`{{ replace_all(element.image, 'registry.k8s.io/', '') }}`}}"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{`{{ element.name }}`}}"
                    image: "{{ $registry }}/{{ $k8sProj }}/{{`{{ k8sImage }}`}}"
                imagePullSecrets:
                  - name: {{ $k8sSecretName }}
          {{- end }}
          # Handle implicit org/user Docker Hub images (e.g., graylog/graylog:6.3.1, velero/velero:v1.17.1)
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ .Values.harborProxyCache.registry }}{{`') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'index.docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'registry-1.docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ regex_match('^[^/.:]+/.+$', element.image) }}`}}"
                  operator: Equals
                  value: true
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{`{{ element.name }}`}}"
                    image: "{{ $registry }}/{{ $dockerHubProj }}/{{`{{ element.image }}`}}"
                imagePullSecrets:
                  - name: {{ .Values.harborProxyCache.imagePullSecretName }}
          # Handle implicit official Docker Hub images (e.g., nginx:1.27.1, nats:2.11.1-alpine)
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ .Values.harborProxyCache.registry }}{{`') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'index.docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'registry-1.docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ regex_match('^[^/]+$', element.image) }}`}}"
                  operator: Equals
                  value: true
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{`{{ element.name }}`}}"
                    image: "{{ $registry }}/{{ $dockerHubProj }}/library/{{`{{ element.image }}`}}"
                imagePullSecrets:
                  - name: {{ .Values.harborProxyCache.imagePullSecretName }}
          # Handle index.docker.io/ initContainers
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ .Values.harborProxyCache.registry }}{{`') }}`}}"
                  operator: Equals
                  value: false
              any:
                - key: "{{`{{ contains(element.image, 'index.docker.io/') }}`}}"
                  operator: Equals
                  value: true
                - key: "{{`{{ contains(element.image, 'registry-1.docker.io/') }}`}}"
                  operator: Equals
                  value: true
            context:
              - name: resolvedImage
                variable:
                  value: "{{`{{ replace_all(replace_all(element.image, 'index.docker.io/', ''), 'registry-1.docker.io/', '') }}`}}"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{`{{ element.name }}`}}"
                    image: "{{ $registry }}/{{ $dockerHubProj }}/{{`{{ resolvedImage }}`}}"
                imagePullSecrets:
                  - name: {{ $secretName }}
          # Handle docker.io/ initContainers (but not index.docker.io/)
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ .Values.harborProxyCache.registry }}{{`') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'index.docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'registry-1.docker.io/') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'docker.io/') }}`}}"
                  operator: Equals
                  value: true
            context:
              - name: resolvedImage
                variable:
                  value: "{{`{{ replace_all(element.image, 'docker.io/', '') }}`}}"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{`{{ element.name }}`}}"
                    image: "{{ $registry }}/{{ $dockerHubProj }}/{{`{{ resolvedImage }}`}}"
                imagePullSecrets:
                  - name: {{ $secretName }}
          {{- if $ghcrProj }}
          # ghcr.io initContainers
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ $registry }}{{`') }}`}}"
                  operator: Equals
                  value: false
                - key: "{{`{{ contains(element.image, 'ghcr.io/') }}`}}"
                  operator: Equals
                  value: true
            context:
              - name: ghcrImage
                variable:
                  value: "{{`{{ replace_all(element.image, 'ghcr.io/', '') }}`}}"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{`{{ element.name }}`}}"
                    image: "{{ $registry }}/{{ $ghcrProj }}/{{`{{ ghcrImage }}`}}"
                imagePullSecrets:
                  - name: {{ $ghcrSecretName }}
          {{- end }}
          {{- if $k8sProj }}
          # registry.k8s.io initContainers
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{`{{ contains(element.image, '`}}{{ $registry }}{{`') }}`}}"
